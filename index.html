<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTBNCA — Agent HQ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d0d1a; overflow: hidden; font-family: -apple-system, 'SF Pro Display', sans-serif; color: #fff; user-select: none; }

canvas { display: block; position: absolute; top: 0; left: 0; }

/* HUD TOP */
#hud {
  position: fixed; top: 0; left: 0; right: 0; z-index: 20;
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 24px;
  background: linear-gradient(180deg, rgba(10,10,28,0.98) 0%, transparent 100%);
  pointer-events: none;
}
#logo { font-size: 18px; font-weight: 900; letter-spacing: 4px; background: linear-gradient(90deg, #a855f7, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 12px rgba(168,85,247,0.8)); }
#clock { font-size: 12px; color: rgba(255,255,255,0.5); letter-spacing: 2px; }
#online { font-size: 11px; color: #34d399; letter-spacing: 2px; display: flex; align-items: center; gap: 6px; }
.pulse { width: 6px; height: 6px; border-radius: 50%; background: #34d399; box-shadow: 0 0 8px #34d399; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* SIDE PANEL */
#sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: 200px; z-index: 15;
  background: rgba(8,8,22,0.97); border-right: 1px solid rgba(168,85,247,0.2);
  padding-top: 56px; overflow-y: auto; backdrop-filter: blur(20px);
}
#sidebar::-webkit-scrollbar { width: 3px; }
#sidebar::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.3); border-radius: 2px; }
.sb-section { padding: 12px 12px 4px; font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.25); text-transform: uppercase; }
.agent-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; cursor: pointer; transition: all 0.15s;
  border-left: 2px solid transparent;
}
.agent-btn:hover { background: rgba(168,85,247,0.1); border-left-color: rgba(168,85,247,0.5); }
.agent-btn.active { background: rgba(168,85,247,0.15); border-left-color: #a855f7; }
.ab-avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; flex-shrink: 0; }
.ab-info { flex: 1; min-width: 0; }
.ab-name { font-size: 12px; font-weight: 800; }
.ab-role { font-size: 9px; color: rgba(255,255,255,0.4); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* CHAT */
#chat {
  position: fixed; right: 0; top: 0; bottom: 0; width: 320px; z-index: 20;
  background: rgba(8,8,22,0.98); border-left: 1px solid rgba(168,85,247,0.2);
  display: none; flex-direction: column; backdrop-filter: blur(20px);
}
#chat.open { display: flex; }
#chat-head {
  padding: 18px 16px 14px; border-bottom: 1px solid rgba(168,85,247,0.15);
  display: flex; align-items: center; gap: 12px;
}
#ch-avatar { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; flex-shrink: 0; }
#ch-name { font-size: 15px; font-weight: 800; }
#ch-role { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }
#ch-status { font-size: 9px; letter-spacing: 1px; margin-top: 3px; }
#ch-close { margin-left: auto; background: none; border: none; color: rgba(255,255,255,0.3); font-size: 18px; cursor: pointer; padding: 4px 6px; border-radius: 6px; transition: all 0.2s; }
#ch-close:hover { background: rgba(255,255,255,0.08); color: #fff; }

#chat-msgs { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
#chat-msgs::-webkit-scrollbar { width: 3px; }
#chat-msgs::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.3); }

.msg { display: flex; gap: 8px; animation: slideUp 0.25s ease; }
@keyframes slideUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.msg.me { flex-direction: row-reverse; }
.mv { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.mb { padding: 9px 13px; border-radius: 12px; font-size: 13px; line-height: 1.5; max-width: 220px; }
.msg.bot .mb { background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.2); color: rgba(255,255,255,0.9); border-radius: 4px 12px 12px 12px; }
.msg.me .mb { background: linear-gradient(135deg, #7c3aed, #0e7490); color: #fff; border-radius: 12px 4px 12px 12px; }
.mt { font-size: 9px; color: rgba(255,255,255,0.2); margin-top: 3px; }

.typing-bubble { display: flex; gap: 4px; padding: 10px 14px; }
.typing-bubble span { width: 5px; height: 5px; border-radius: 50%; background: rgba(168,85,247,0.5); animation: tb 1.2s infinite; }
.typing-bubble span:nth-child(2){animation-delay:.2s} .typing-bubble span:nth-child(3){animation-delay:.4s}
@keyframes tb { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

#chat-input-row { padding: 12px; border-top: 1px solid rgba(168,85,247,0.15); display: flex; gap: 8px; align-items: flex-end; }
#chat-input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 9px 12px; color: #fff; font-size: 13px; outline: none; resize: none; min-height: 38px; max-height: 90px; font-family: inherit; transition: border-color 0.2s; }
#chat-input:focus { border-color: rgba(168,85,247,0.4); }
#chat-input::placeholder { color: rgba(255,255,255,0.2); }
#chat-send { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg,#7c3aed,#0e7490); border: none; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 0 14px rgba(124,58,237,0.4); flex-shrink: 0; }
#chat-send:hover { transform: scale(1.08); box-shadow: 0 0 22px rgba(124,58,237,0.7); }

/* ACTIVITY FEED */
#activity {
  position: fixed; right: 0; bottom: 0; width: 320px;
  max-height: 180px; overflow-y: auto; z-index: 14;
  background: rgba(5,5,15,0.9); border-top: 1px solid rgba(168,85,247,0.15);
  padding: 10px 14px;
  backdrop-filter: blur(10px);
}
#activity.hidden { display: none; }
#activity::-webkit-scrollbar { width: 2px; }
.activity-item { font-size: 11px; color: rgba(255,255,255,0.5); padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; gap: 8px; }
.activity-item .at { color: rgba(168,85,247,0.7); font-weight: 700; }
.activity-item .ts { color: rgba(255,255,255,0.2); font-size: 10px; margin-left: auto; }

/* CANVAS AREA */
#scene { position: fixed; left: 200px; right: 0; top: 50px; bottom: 0; overflow: hidden; }

/* TOOLTIP */
#tooltip { position: fixed; z-index: 30; pointer-events: none; display: none;
  background: rgba(8,8,24,0.97); border: 1px solid rgba(168,85,247,0.4);
  border-radius: 12px; padding: 12px 16px; min-width: 180px;
  box-shadow: 0 0 24px rgba(168,85,247,0.25);
}
#tt-name { font-size: 15px; font-weight: 900; }
#tt-role { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 1px; margin: 3px 0 8px; text-transform: uppercase; }
#tt-task { font-size: 12px; color: rgba(255,255,255,0.7); }
#tt-status { font-size: 10px; letter-spacing: 1px; margin-top: 6px; text-transform: uppercase; }
#tt-hint { font-size: 10px; color: rgba(168,85,247,0.6); margin-top: 8px; }

/* CONTROLS */
#controls { position: fixed; bottom: 20px; left: 210px; z-index: 15; display: flex; gap: 8px; }
.cb { width: 38px; height: 38px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.cb:hover { background: rgba(168,85,247,0.2); border-color: rgba(168,85,247,0.5); color: #fff; }

/* LEGEND */
#legend { position: fixed; bottom: 20px; right: 20px; z-index: 15; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
#legend.hidden { display: none; }
.li { display: flex; align-items: center; gap: 7px; font-size: 10px; color: rgba(255,255,255,0.35); letter-spacing: 1px; }
.ld { width: 7px; height: 7px; border-radius: 50%; }
</style>
</head>
<body>

<div id="hud">

</div>

<script>
// ======================================================
// AGENTS
// ======================================================
const AGENTS = [
  {
    id: 0, name: "ALPHA", greek: "Α", emoji: "👑",
    role: "Director", color: "#a855f7", status: "active",
    task: "Orchestrating all agent operations",

    responses: ["Управляю всеми агентами 24/7.", "Делегирую задачи оптимально.", "Система работает стабильно.", "Следующий апдейт через 30 минут."]
  },
  {
    id: 1, name: "BETA", greek: "Β", emoji: "🎨",
    role: "Content Creator", color: "#22d3ee", status: "active",
    task: "Generating AI prompts for @artbnca reels",
    room: "creative",
    responses: ["Промпты для рилсов готовы.", "Tweety Bird в каждом кадре — без исключений.", "Border Security формат набирает охват.", "7 новых промптов в очереди."]
  },
  {
    id: 2, name: "GAMMA", greek: "Γ", emoji: "🎬",
    role: "Video Producer", color: "#34d399", status: "processing",
    task: "Processing Kling AI video clips",
    room: "production",
    responses: ["Видео обрабатывается в Kling AI.", "Клип 5 секунд, статичная камера.", "Очередь: 3 видео в процессе.", "Последний ролик набрал 12K за час."]
  },
  {

    task: "Monitoring Kraken positions 24/7",
    room: "trading",
    responses: ["Kraken баланс: $39.18.", "SOL показывает сигнал. Жду подтверждения.", "Позиции стабильны, стоп-лосс активен.", "Волатильность низкая. Держу позиции."]
  },
  {
    id: 4, name: "EPSILON", greek: "Ε", emoji: "🎯",
    role: "Market Analyst", color: "#f59e0b", status: "standby",
    task: "Analyzing Kalshi prediction markets",
    room: "trading",
    responses: ["Kalshi: позиция YES @ $0.78.", "CPI данные выходят 10 апреля.", "Confidence сигнала 73%. Ставим?", "Рынок прогнозирует инфляцию 3.1%."]
  },
  {
    id: 5, name: "ZETA", greek: "Ζ", emoji: "🔍",
    role: "Trend Scout", color: "#22d3ee", status: "active",
    task: "Monitoring Instagram & TikTok trends",
    room: "research",
    responses: ["Border Security тренд +34% за неделю.", "Алгоритм любит 7-9 секунд сейчас.", "US аудитория выросла до 22%.", "Новый вирусный формат: eviction series."]
  },
  {
    id: 6, name: "ETA", greek: "Η", emoji: "💬",
    role: "Community Manager", color: "#34d399", status: "active",
    task: "Engaging community on Moltbook",
    room: "comms",
    responses: ["Moltbook карма растёт.", "Опубликовал 2 поста сегодня.", "Community engagement +12%.", "4 новых упоминания в треде."]
  },
  {
    id: 7, name: "THETA", greek: "Θ", emoji: "✨",
    role: "Image Generator", color: "#a855f7", status: "processing",
    task: "Running Nano Banana image queue",
    room: "creative",
    responses: ["Nano Banana очередь: 7 изображений.", "Последний промпт — отличный результат.", "Tweety Bird добавлен. ✅", "4К рендер занимает ~2 минуты."]
  },
  {
    id: 8, name: "IOTA", greek: "Ι", emoji: "🚀",
    role: "Growth Marketer", color: "#34d399", status: "active",
    task: "Growing @artbnca to 200K followers",
    room: "marketing",
    responses: ["@artbnca: 152K → 153.2K за неделю.", "Рост US аудитории +1.2%.", "Лучшее время постинга: 9AM PT.", "Рекомендую увеличить Border Security."]
  },
  {
    id: 9, name: "KAPPA", greek: "Κ", emoji: "📊",
    role: "Data Analyst", color: "#22d3ee", status: "processing",
    task: "Analyzing audience metrics & RPM",
    room: "analytics",
    responses: ["Охват +18%, engagement 4.2%.", "Мексика 35%, США 22% — US растёт.", "RPM Border Security: $0.17-0.18.", "Лучший пост: Tweety + Border 24K views."]
  }
];

const STATUS_COLOR = { active:"#34d399", processing:"#a855f7", standby:"#22d3ee", idle:"#f59e0b" };

// ======================================================
// SIDEBAR
// ======================================================
const agentList = document.getElementById('agent-list');
AGENTS.forEach(a => {
  const d = document.createElement('div');
  d.className = 'agent-btn';
  d.id = `ab-${a.id}`;
  d.innerHTML = `
    <div class="ab-avatar" style="background:${a.color}22;border:1px solid ${a.color}44;color:${a.color}">${a.greek}</div>
    <div class="ab-info">
      <div class="ab-name" style="color:${a.color}">${a.name}</div>
      <div class="ab-role">${a.role}</div>
    </div>
    <div class="ab-dot" style="background:${STATUS_COLOR[a.status]};box-shadow:0 0 5px ${STATUS_COLOR[a.status]}"></div>`;
  d.onclick = () => openChat(a);
  agentList.appendChild(d);
});

// ======================================================
// ISOMETRIC CANVAS ENGINE
// ======================================================
const canvas = document.getElementById('iso-canvas');
const ctx = canvas.getContext('2d');

let W, H, scale = 1, offsetX = 0, offsetY = 0;
let dragging = false, dragStart = {x:0,y:0}, dragOffset = {x:0,y:0};

function resize() {
  const scene = document.getElementById('scene');
  W = canvas.width = scene.clientWidth;
  H = canvas.height = scene.clientHeight;
  draw();
}
window.addEventListener('resize', resize);

// ISO helpers
const ISO_TILE = 64;
function isoX(tx, ty) { return (tx - ty) * (ISO_TILE/2) * scale + W/2 + offsetX; }
function isoY(tx, ty) { return (tx + ty) * (ISO_TILE/4) * scale + H/4 + offsetY; }

// ROOMS layout (grid positions)
const ROOMS = [
  { name:"boardroom",  x:0,  y:0,  w:6, h:5, color:"#1a1035", border:"#7c3aed", label:"BOARDROOM" },
  { name:"creative",   x:7,  y:0,  w:6, h:5, color:"#071828", border:"#0e7490", label:"CREATIVE STUDIO" },
  { name:"production", x:14, y:0,  w:5, h:5, color:"#071a12", border:"#065f46", label:"PRODUCTION" },
  { name:"trading",    x:0,  y:6,  w:6, h:5, color:"#1a1200", border:"#92400e", label:"TRADING DESK" },
  { name:"research",   x:7,  y:6,  w:6, h:5, color:"#071828", border:"#0e7490", label:"RESEARCH LAB" },
  { name:"comms",      x:14, y:6,  w:5, h:5, color:"#071a12", border:"#065f46", label:"COMMS CENTER" },
  { name:"marketing",  x:0,  y:12, w:6, h:5, color:"#071a12", border:"#065f46", label:"MARKETING HQ" },
  { name:"analytics",  x:7,  y:12, w:6, h:5, color:"#1a1035", border:"#7c3aed", label:"ANALYTICS" },
];

// DESKS per room (tile positions)
const DESKS = {
  boardroom:  [[2,1],[3,2],[1,3]],
  creative:   [[8,1],[10,1],[9,3]],
  production: [[15,1],[16,2]],
  trading:    [[2,7],[3,8]],
  research:   [[8,7],[10,7]],
  comms:      [[15,7]],
  marketing:  [[2,13]],
  analytics:  [[8,13],[9,14]],
};

// Assign agents to desks
AGENTS.forEach((a, i) => {
  const desks = DESKS[a.room] || [[i*2, i*2]];
  const desk = desks[0] || [2,2];
  a.deskX = desk[0]; a.deskY = desk[1];
  a.x = desk[0] + 0.5; a.y = desk[1] + 0.5;
  a.tx = a.x; a.ty = a.y;
  a.walkPhase = Math.random() * Math.PI * 2;
  a.idleTimer = Math.random() * 300;
  a.walking = false;
  a.bobPhase = Math.random() * Math.PI * 2;
});

// ======================================================
// DRAW
// ======================================================
function drawTile(tx, ty, fillColor, alpha=1) {
  const cx = isoX(tx,ty), cy = isoY(tx,ty);
  const hw = (ISO_TILE/2)*scale, hh = (ISO_TILE/4)*scale;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.moveTo(cx, cy-hh);
  ctx.lineTo(cx+hw, cy);
  ctx.lineTo(cx, cy+hh);
  ctx.lineTo(cx-hw, cy);
  ctx.closePath();
  ctx.fillStyle = fillColor;
  ctx.fill();
  ctx.restore();
}

function drawRoom(room) {
  const { x, y, w, h, color, border, label } = room;
  // Floor tiles
  for (let tx=x; tx<x+w; tx++) {
    for (let ty=y; ty<y+h; ty++) {
      drawTile(tx, ty, color, 0.85);
    }
  }
  // Border walls (left and top)
  for (let tx=x; tx<x+w; tx++) {
    const cx = isoX(tx, y), cy = isoY(tx, y);
    const hw = (ISO_TILE/2)*scale, hh = (ISO_TILE/4)*scale;
    ctx.save();
    ctx.strokeStyle = border;
    ctx.lineWidth = 1.5 * scale;
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.moveTo(cx-hw, cy);
    ctx.lineTo(cx, cy-hh);
    ctx.lineTo(cx+hw, cy);
    ctx.stroke();
    ctx.restore();
  }
  for (let ty=y; ty<y+h; ty++) {
    const cx = isoX(x, ty), cy = isoY(x, ty);
    const hw = (ISO_TILE/2)*scale, hh = (ISO_TILE/4)*scale;
    ctx.save();
    ctx.strokeStyle = border;
    ctx.lineWidth = 1.5 * scale;
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.moveTo(cx-hw, cy);
    ctx.lineTo(cx, cy-hh);
    ctx.stroke();
    ctx.restore();
  }
  // Room label
  const lx = isoX(x + w/2, y + h/2);
  const ly = isoY(x + w/2, y + h/2) - 12*scale;
  ctx.save();
  ctx.globalAlpha = 0.2;
  ctx.fillStyle = border;
  ctx.font = `bold ${Math.max(9, 10*scale)}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(label, lx, ly);
  ctx.restore();
}

function drawDesk(tx, ty, color) {
  const cx = isoX(tx+0.5, ty+0.5);
  const cy = isoY(tx+0.5, ty+0.5);
  const s = scale;
  
  // Desk surface (iso box)
  ctx.save();
  // Top face
  ctx.beginPath();
  ctx.moveTo(cx, cy - 12*s);
  ctx.lineTo(cx + 18*s, cy - 6*s);
  ctx.lineTo(cx, cy);
  ctx.lineTo(cx - 18*s, cy - 6*s);
  ctx.closePath();
  ctx.fillStyle = '#1a1a3a';
  ctx.fill();
  // Left face
  ctx.beginPath();
  ctx.moveTo(cx - 18*s, cy - 6*s);
  ctx.lineTo(cx, cy);
  ctx.lineTo(cx, cy + 8*s);
  ctx.lineTo(cx - 18*s, cy + 2*s);
  ctx.closePath();
  ctx.fillStyle = '#0f0f28';
  ctx.fill();
  // Right face
  ctx.beginPath();
  ctx.moveTo(cx + 18*s, cy - 6*s);
  ctx.lineTo(cx, cy);
  ctx.lineTo(cx, cy + 8*s);
  ctx.lineTo(cx + 18*s, cy + 2*s);
  ctx.closePath();
  ctx.fillStyle = '#12122e';
  ctx.fill();
  // Glow edge
  ctx.beginPath();
  ctx.moveTo(cx - 18*s, cy - 6*s);
  ctx.lineTo(cx, cy - 12*s);
  ctx.lineTo(cx + 18*s, cy - 6*s);
  ctx.strokeStyle = color;
  ctx.globalAlpha = 0.5;
  ctx.lineWidth = 1*s;
  ctx.stroke();
  // Monitor
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = '#0a0a1e';
  ctx.fillRect(cx - 10*s, cy - 26*s, 20*s, 14*s);
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.2;
  ctx.fillRect(cx - 9*s, cy - 25*s, 18*s, 12*s);
  ctx.restore();
}

function drawAgent(a, time) {
  const ax = isoX(a.x, a.y);
  const ay = isoY(a.x, a.y);
  const s = scale;
  const bob = Math.sin(a.bobPhase + time * 2) * 2 * s;
  const statusColor = STATUS_COLOR[a.status];
  
  ctx.save();
  
  // Shadow
  ctx.globalAlpha = 0.2;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(ax, ay + 2*s, 10*s, 5*s, 0, 0, Math.PI*2);
  ctx.fill();
  
  // Body
  ctx.globalAlpha = 1;
  ctx.fillStyle = a.color;
  ctx.beginPath();
  ctx.roundRect(ax - 8*s, ay - 22*s - bob, 16*s, 14*s, 3*s);
  ctx.fill();
  
  // Head
  ctx.fillStyle = a.color;
  ctx.globalAlpha = 0.9;
  ctx.beginPath();
  ctx.roundRect(ax - 7*s, ay - 34*s - bob, 14*s, 12*s, 4*s);
  ctx.fill();
  
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 1;
  ctx.fillRect(ax - 4*s, ay - 30*s - bob, 2.5*s, 2*s);
  ctx.fillRect(ax + 1.5*s, ay - 30*s - bob, 2.5*s, 2*s);
  
  // Status orb
  const orbPulse = 0.7 + Math.sin(time * 3 + a.walkPhase) * 0.3;
  ctx.globalAlpha = orbPulse;
  ctx.fillStyle = statusColor;
  ctx.shadowColor = statusColor;
  ctx.shadowBlur = 10*s;
  ctx.beginPath();
  ctx.arc(ax, ay - 42*s - bob + Math.sin(time*2)*2*s, 4*s, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
  
  // Name tag
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.max(9, 10*s)}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(a.name, ax, ay - 48*s - bob);
  
  // Role (smaller)
  ctx.globalAlpha = 0.45;
  ctx.font = `${Math.max(7, 8*s)}px -apple-system, sans-serif`;
  ctx.fillStyle = a.color;
  ctx.fillText(a.role, ax, ay - 38*s - bob);
  
  ctx.restore();
}

// ======================================================
// AGENT MOVEMENT AI
// ======================================================
const MEETING_SPOTS = [[3,3],[10,3],[16,3],[3,9],[10,9],[16,9]];

function updateAgents(dt) {
  AGENTS.forEach(a => {
    a.bobPhase += dt * 2;
    a.idleTimer -= dt * 60;
    
    if (a.walking) {
      const dx = a.tx - a.x, dy = a.ty - a.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist < 0.05) {
        a.x = a.tx; a.y = a.ty; a.walking = false;
      } else {
        const speed = 0.03;
        a.x += (dx/dist)*speed;
        a.y += (dy/dist)*speed;
      }
    }
    
    if (!a.walking && a.idleTimer <= 0) {
      a.idleTimer = 180 + Math.random()*400;
      const r = Math.random();
      if (r < 0.3) {
        // Go to meeting spot
        const spot = MEETING_SPOTS[Math.floor(Math.random()*MEETING_SPOTS.length)];
        a.tx = spot[0] + (Math.random()-0.5)*1.5;
        a.ty = spot[1] + (Math.random()-0.5)*1.5;
        a.walking = true;
        addActivity(a, `${a.name} moved to meeting room`);
      } else if (r < 0.6) {
        // Walk near desk
        a.tx = a.deskX + (Math.random()-0.5)*1.5;
        a.ty = a.deskY + (Math.random()-0.5)*1.5;
        a.walking = true;
      } else {
        // Stay, update task
        const tasks = ["Working on task...", "Processing data...", "Analyzing results...", "Idle - standby"];
        if (Math.random() < 0.2) addActivity(a, getStatusUpdate(a));
      }
    }
  });
}

function getStatusUpdate(a) {
  const updates = {
    ALPHA: ["Delegating tasks", "Reviewing progress", "System check complete"],
    BETA: ["New prompt ready", "Reel batch queued", "Tweety added to frame"],
    GAMMA: ["Video rendered", "Kling AI clip done", "Queue processed"],
    DELTA: ["Position monitored", "Signal detected", "Balance updated"],
    EPSILON: ["Market analyzed", "Prediction updated", "Signal confidence 73%"],
    ZETA: ["Trend detected", "Report generated", "Algorithm update"],
    ETA: ["Community engaged", "Post published", "Karma +5"],
    THETA: ["Image generated", "Prompt optimized", "Batch complete"],
    IOTA: ["Growth +0.3%", "Strategy updated", "Audience segment analyzed"],
    KAPPA: ["Metrics updated", "RPM calculated", "Report ready"],
  };
  const list = updates[a.name] || ["Status updated"];
  return list[Math.floor(Math.random()*list.length)];
}

// ======================================================
// ACTIVITY FEED
// ======================================================
const activityFeed = document.getElementById('activity-feed');
const activityLog = [];

function addActivity(agent, text) {
  const now = new Date();
  const ts = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  activityLog.unshift({ agent, text, ts });
  if (activityLog.length > 20) activityLog.pop();
  renderActivity();
}

function renderActivity() {
  activityFeed.innerHTML = activityLog.map(item => `
    <div class="activity-item">
      <span class="at">${item.agent.name}</span>
      <span>${item.text}</span>
      <span class="ts">${item.ts}</span>
    </div>
  `).join('');
}

// Boot activity
setTimeout(() => { AGENTS.forEach(a => addActivity(a, `${a.name} online — ${a.task.substring(0,30)}...`)); }, 500);

// ======================================================
// MAIN DRAW LOOP
// ======================================================
let lastTime = 0;
function draw(time=0) {
  const dt = (time - lastTime) / 1000;
  lastTime = time;
  
  ctx.clearRect(0, 0, W, H);
  
  // Background
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, W, H);
  
  // Rooms
  ROOMS.forEach(r => drawRoom(r));
  
  // Desks (sort by y for proper overlap)
  Object.entries(DESKS).forEach(([room, desks]) => {
    const agent = AGENTS.find(a => a.room === room);
    const color = agent ? agent.color : '#a855f7';
    desks.forEach(([tx,ty]) => drawDesk(tx, ty, color));
  });
  
  // Agents sorted by y position (back-to-front)
  const sorted = [...AGENTS].sort((a,b) => (a.x+a.y)-(b.x+b.y));
  sorted.forEach(a => drawAgent(a, time/1000));
  
  // Agent movement
  if (dt > 0 && dt < 0.1) updateAgents(dt);
  
  requestAnimationFrame(draw);
}

// ======================================================
// HOVER / CLICK
// ======================================================
const tooltip = document.getElementById('tooltip');

function getAgentAtMouse(mx, my) {
  // Convert mouse to iso coords (rough)
  let closest = null, minDist = Infinity;
  AGENTS.forEach(a => {
    const ax = isoX(a.x, a.y);
    const ay = isoY(a.x, a.y) - 30*scale;
    const dist = Math.sqrt((mx-ax)**2 + (my-ay)**2);
    if (dist < 30*scale && dist < minDist) {
      minDist = dist; closest = a;
    }
  });
  return closest;
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const agent = getAgentAtMouse(mx, my);
  if (agent) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 80) + 'px';
    document.getElementById('tt-name').textContent = agent.name;
    document.getElementById('tt-name').style.color = agent.color;
    document.getElementById('tt-role').textContent = agent.role;
    document.getElementById('tt-task').textContent = '→ ' + agent.task;
    const sc = STATUS_COLOR[agent.status];
    document.getElementById('tt-status').textContent = '● ' + agent.status.toUpperCase();
    document.getElementById('tt-status').style.color = sc;
    canvas.style.cursor = 'pointer';
    if (!dragging) return;
  } else {
    tooltip.style.display = 'none';
    canvas.style.cursor = dragging ? 'grabbing' : 'grab';
  }
  if (dragging) {
    offsetX = dragOffset.x + (e.clientX - dragStart.x);
    offsetY = dragOffset.y + (e.clientY - dragStart.y);
  }
});

canvas.addEventListener('mousedown', e => {
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  dragOffset = { x: offsetX, y: offsetY };
  canvas.style.cursor = 'grabbing';
});
window.addEventListener('mouseup', () => { dragging = false; canvas.style.cursor = 'grab'; });

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const agent = getAgentAtMouse(e.clientX - rect.left, e.clientY - rect.top);
  if (agent) openChat(agent);
});

canvas.addEventListener('wheel', e => {
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  scale = Math.max(0.4, Math.min(2.5, scale * factor));
  e.preventDefault();
}, { passive: false });

function zoomIn() { scale = Math.min(2.5, scale * 1.15); }
function zoomOut() { scale = Math.max(0.4, scale * 0.85); }
function resetView() { scale = 1; offsetX = 0; offsetY = 0; }

// ======================================================
// CHAT
// ======================================================
let activeAgent = null;

function openChat(agent) {
  activeAgent = agent;
  document.querySelectorAll('.agent-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`ab-${agent.id}`)?.classList.add('active');
  
  document.getElementById('chat').classList.add('open');
  document.getElementById('activity').style.right = '320px';
  document.getElementById('legend').style.right = '330px';
  
  const av = document.getElementById('ch-avatar');
  av.textContent = agent.greek;
  av.style.background = agent.color + '22';
  av.style.border = `1px solid ${agent.color}44`;
  av.style.color = agent.color;
  document.getElementById('ch-name').textContent = agent.name;
  document.getElementById('ch-name').style.color = agent.color;
  document.getElementById('ch-role').textContent = agent.role;
  document.getElementById('ch-status').textContent = '● ' + agent.status.toUpperCase();
  document.getElementById('ch-status').style.color = STATUS_COLOR[agent.status];
  
  const msgs = document.getElementById('chat-msgs');
  msgs.innerHTML = '';
  
  setTimeout(() => {
    showTyping();
    setTimeout(() => {
      removeTyping();
      addMsg(agent, getRandom(agent.responses), 'bot');
    }, 900 + Math.random()*400);
  }, 200);
}

function closeChat() {
  document.getElementById('chat').classList.remove('open');
  document.getElementById('activity').style.right = '0';
  document.getElementById('legend').style.right = '20px';
  document.querySelectorAll('.agent-btn').forEach(b => b.classList.remove('active'));
  activeAgent = null;
}

function getTime() {
  const n = new Date();
  return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}
function getRandom(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

function addMsg(agent, text, type) {
  const msgs = document.getElementById('chat-msgs');
  const d = document.createElement('div');
  d.className = `msg ${type}`;
  if (type === 'bot') {
    d.innerHTML = `<div class="mv" style="background:${agent.color}22;border:1px solid ${agent.color}33;color:${agent.color}">${agent.greek}</div>
      <div><div class="mb">${text}</div><div class="mt">${getTime()}</div></div>`;
  } else {
    d.innerHTML = `<div><div class="mb">${text}</div><div class="mt" style="text-align:right">${getTime()}</div></div>
      <div class="mv" style="background:#7c3aed22;border:1px solid #7c3aed33;color:#a855f7">A</div>`;
  }
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  if (!activeAgent) return;
  const msgs = document.getElementById('chat-msgs');
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typing';
  d.innerHTML = `<div class="mv" style="background:${activeAgent.color}22;color:${activeAgent.color}">${activeAgent.greek}</div>
    <div class="mb"><div class="typing-bubble"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function sendMsg() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !activeAgent) return;
  input.value = '';
  addMsg(activeAgent, text, 'me');
  showTyping();
  setTimeout(() => {
    removeTyping();
    addMsg(activeAgent, getRandom(activeAgent.responses), 'bot');
    addActivity(activeAgent, `Ответил на запрос`);
  }, 600 + Math.random()*700);
}

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

// ======================================================
// CLOCK
// ======================================================
setInterval(() => {
  const n = new Date();
  document.getElementById('clock').textContent =
    `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')} PDT`;
}, 1000);

// Auto activity every 30s
setInterval(() => {
  const a = AGENTS[Math.floor(Math.random()*AGENTS.length)];
  addActivity(a, getStatusUpdate(a));
}, 30000);

// ======================================================
// START
// ======================================================
resize();
requestAnimationFrame(draw);
canvas.style.cursor = 'grab';
</script>
