<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTBNCA — Agent HQ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  #canvas { width: 100vw; height: 100vh; display: block; }

  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 24px;
    background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
    pointer-events: none; z-index: 10;
  }
  #logo {
    font-size: 22px; font-weight: 900; letter-spacing: 3px;
    background: linear-gradient(90deg, #7c3aed, #06b6d4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 0 12px rgba(124,58,237,0.8));
  }
  #clock {
    font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 2px;
  }
  #status {
    font-size: 11px; color: #10b981; letter-spacing: 2px;
    display: flex; align-items: center; gap: 6px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  #tooltip {
    position: fixed; pointer-events: none; z-index: 100;
    background: rgba(10,10,20,0.95);
    border: 1px solid rgba(124,58,237,0.4);
    border-radius: 12px; padding: 14px 18px;
    min-width: 200px; display: none;
    box-shadow: 0 0 30px rgba(124,58,237,0.3);
  }
  #tooltip .agent-name { font-size: 16px; font-weight: 900; color: #fff; margin-bottom: 4px; }
  #tooltip .agent-role { font-size: 11px; color: #7c3aed; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  #tooltip .agent-status { font-size: 12px; color: #10b981; display: flex; align-items: center; gap: 6px; }
  #tooltip .agent-task { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 6px; }

  #legend {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 24px; z-index: 10; pointer-events: none;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 1px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  #controls {
    position: fixed; bottom: 24px; right: 24px; z-index: 10;
    display: flex; flex-direction: column; gap: 8px;
  }
  .ctrl-btn {
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; pointer-events: all;
  }
  .ctrl-btn:hover { background: rgba(124,58,237,0.3); border-color: rgba(124,58,237,0.5); color: #fff; }
</style>
</head>
<body>

<div id="hud">
  <div id="logo">✦ ARTBNCA HQ</div>
  <div id="clock"></div>
  <div id="status"><div class="dot"></div> <span>12 AGENTS ONLINE</span></div>
</div>

<div id="tooltip">
  <div class="agent-name" id="tt-name"></div>
  <div class="agent-role" id="tt-role"></div>
  <div class="agent-status"><div class="dot"></div><span id="tt-status"></span></div>
  <div class="agent-task" id="tt-task"></div>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>ACTIVE</div>
  <div class="legend-item"><div class="legend-dot" style="background:#7c3aed"></div>PROCESSING</div>
  <div class="legend-item"><div class="legend-dot" style="background:#06b6d4"></div>STANDBY</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>IDLE</div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="btn-reset" title="Reset view">⌂</button>
  <button class="ctrl-btn" id="btn-top" title="Top view">↑</button>
</div>

<canvas id="canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// AGENTS DATA
// ============================================================
const AGENTS = [
  { id: 0, name: "ARTY", role: "Chief Director", task: "Orchestrating all agents", color: 0x7c3aed, status: "active", pos: [0, 0, 0] },
  { id: 1, name: "NOVA", role: "Content Creator", task: "Generating AI prompts for reels", color: 0x06b6d4, status: "active", pos: [-5, 0, -4] },
  { id: 2, name: "BLADE", role: "Video Editor", task: "Processing Kling AI clips", color: 0x10b981, status: "processing", pos: [5, 0, -4] },
  { id: 3, name: "SCOUT", role: "Trend Analyst", task: "Monitoring Instagram trends", color: 0x06b6d4, status: "active", pos: [-8, 0, 0] },
  { id: 4, name: "KRYPTO", role: "Crypto Trader", task: "Monitoring Kraken positions", color: 0xf59e0b, status: "standby", pos: [8, 0, 0] },
  { id: 5, name: "KALSHI", role: "Market Predictor", task: "Analyzing KXCPIYOY positions", color: 0xf59e0b, status: "standby", pos: [8, 0, 4] },
  { id: 6, name: "MOLTI", role: "Community Manager", task: "Engaging on Moltbook", color: 0x10b981, status: "active", pos: [-8, 0, 4] },
  { id: 7, name: "SCRIBE", role: "Secretary", task: "Managing task queue", color: 0x06b6d4, status: "active", pos: [-5, 0, 4] },
  { id: 8, name: "LEXUS", role: "Legal Advisor", task: "Reviewing DS-160 documents", color: 0xec4899, status: "idle", pos: [5, 0, 4] },
  { id: 9, name: "FLUX", role: "Image Generator", task: "Running Nano Banana queue", color: 0x7c3aed, status: "processing", pos: [0, 0, -7] },
  { id: 10, name: "ARCHER", role: "SEO Marketer", task: "Optimizing @artbnca growth", color: 0x10b981, status: "active", pos: [-3, 0, 7] },
  { id: 11, name: "AXIOM", role: "Data Analyst", task: "Analyzing audience metrics", color: 0x06b6d4, status: "processing", pos: [3, 0, 7] },
];

const STATUS_COLORS = {
  active: 0x10b981,
  processing: 0x7c3aed,
  standby: 0x06b6d4,
  idle: 0xf59e0b
};

// ============================================================
// THREE.JS SETUP
// ============================================================
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x030308);
scene.fog = new THREE.FogExp2(0x030308, 0.045);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 18, 20);
camera.lookAt(0, 0, 0);

// ============================================================
// LIGHTING
// ============================================================
const ambient = new THREE.AmbientLight(0x0a0a1a, 2);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0x7c3aed, 1.5);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
scene.add(dirLight);

const pointLight1 = new THREE.PointLight(0x06b6d4, 3, 30);
pointLight1.position.set(-10, 5, -10);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0x7c3aed, 3, 30);
pointLight2.position.set(10, 5, 10);
scene.add(pointLight2);

// ============================================================
// FLOOR — Grid
// ============================================================
const floorGeo = new THREE.PlaneGeometry(40, 40, 40, 40);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x0a0a1a,
  wireframe: false,
  metalness: 0.8,
  roughness: 0.2,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Grid lines
const gridHelper = new THREE.GridHelper(40, 40, 0x1a1a3a, 0x111128);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// ============================================================
// WALLS (glass panels)
// ============================================================
function createWallPanel(w, h, x, y, z, rotY = 0) {
  const geo = new THREE.PlaneGeometry(w, h);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x0f0f2a,
    transparent: true,
    opacity: 0.3,
    side: THREE.DoubleSide,
    metalness: 0.9,
    roughness: 0.1,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  mesh.rotation.y = rotY;
  scene.add(mesh);
  
  // Edge glow
  const edges = new THREE.EdgesGeometry(geo);
  const lineMat = new THREE.LineBasicMaterial({ color: 0x7c3aed, transparent: true, opacity: 0.3 });
  const wireframe = new THREE.LineSegments(edges, lineMat);
  mesh.add(wireframe);
}

createWallPanel(40, 8, 0, 4, -20);
createWallPanel(40, 8, 0, 4, 20);
createWallPanel(8, 8, -20, 4, 0, Math.PI / 2);
createWallPanel(8, 8, 20, 4, 0, Math.PI / 2);

// ============================================================
// AGENT WORKSTATIONS
// ============================================================
const agentMeshes = [];
const agentObjects = [];

function createWorkstation(agent) {
  const group = new THREE.Group();
  group.position.set(agent.pos[0], 0, agent.pos[2]);
  group.userData = agent;

  // Desk
  const deskGeo = new THREE.BoxGeometry(2.2, 0.1, 1.4);
  const deskMat = new THREE.MeshStandardMaterial({
    color: 0x0f0f2a,
    metalness: 0.9,
    roughness: 0.1,
    transparent: true,
    opacity: 0.8,
  });
  const desk = new THREE.Mesh(deskGeo, deskMat);
  desk.position.y = 0.7;
  desk.castShadow = true;
  desk.receiveShadow = true;
  group.add(desk);

  // Desk legs
  const legGeo = new THREE.BoxGeometry(0.05, 0.7, 0.05);
  const legMat = new THREE.MeshStandardMaterial({ color: 0x1a1a3a, metalness: 1, roughness: 0 });
  [[-0.95, -0.6], [0.95, -0.6], [-0.95, 0.6], [0.95, 0.6]].forEach(([lx, lz]) => {
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(lx, 0.35, lz);
    group.add(leg);
  });

  // Monitor
  const monGeo = new THREE.BoxGeometry(1.4, 0.9, 0.05);
  const monColor = agent.id === 0 ? 0x2a0a4a : 0x0a0a2a;
  const monMat = new THREE.MeshStandardMaterial({
    color: monColor,
    emissive: agent.color,
    emissiveIntensity: 0.15,
    metalness: 0.5,
    roughness: 0.3,
  });
  const monitor = new THREE.Mesh(monGeo, monMat);
  monitor.position.set(0, 1.25, -0.4);
  group.add(monitor);

  // Screen glow plane
  const screenGeo = new THREE.PlaneGeometry(1.3, 0.8);
  const screenMat = new THREE.MeshBasicMaterial({
    color: agent.color,
    transparent: true,
    opacity: 0.12,
  });
  const screen = new THREE.Mesh(screenGeo, screenMat);
  screen.position.set(0, 1.25, -0.37);
  group.add(screen);

  // Monitor stand
  const standGeo = new THREE.BoxGeometry(0.08, 0.25, 0.08);
  const standMat = new THREE.MeshStandardMaterial({ color: 0x1a1a3a, metalness: 1 });
  const stand = new THREE.Mesh(standGeo, standMat);
  stand.position.set(0, 0.87, -0.4);
  group.add(stand);

  // Agent body (robot)
  const bodyGeo = new THREE.BoxGeometry(0.35, 0.5, 0.25);
  const bodyMat = new THREE.MeshStandardMaterial({
    color: 0x1a1a3a,
    emissive: agent.color,
    emissiveIntensity: 0.2,
    metalness: 0.9,
    roughness: 0.1,
  });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.set(0, 1.1, 0.3);
  body.userData.isAgent = true;
  group.add(body);

  // Agent head
  const headGeo = new THREE.BoxGeometry(0.25, 0.22, 0.22);
  const headMat = new THREE.MeshStandardMaterial({
    color: 0x0f0f2a,
    emissive: agent.color,
    emissiveIntensity: 0.4,
    metalness: 0.8,
    roughness: 0.1,
  });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.set(0, 1.47, 0.3);
  group.add(head);

  // Eyes
  const eyeGeo = new THREE.BoxGeometry(0.06, 0.04, 0.01);
  const eyeMat = new THREE.MeshBasicMaterial({ color: agent.color });
  [-0.06, 0.06].forEach(ex => {
    const eye = new THREE.Mesh(eyeGeo, eyeMat);
    eye.position.set(ex, 1.49, 0.42);
    group.add(eye);
  });

  // Status orb above agent
  const orbGeo = new THREE.SphereGeometry(0.08, 16, 16);
  const orbMat = new THREE.MeshBasicMaterial({
    color: STATUS_COLORS[agent.status],
    transparent: true,
    opacity: 0.9,
  });
  const orb = new THREE.Mesh(orbGeo, orbMat);
  orb.position.set(0, 2.1, 0.3);
  orb.userData.isOrb = true;
  group.add(orb);

  // Point light for orb glow
  const orbLight = new THREE.PointLight(STATUS_COLORS[agent.status], 1.5, 3);
  orbLight.position.set(0, 2.0, 0.3);
  group.add(orbLight);

  // Name label using sprite
  const canvas2d = document.createElement('canvas');
  canvas2d.width = 256; canvas2d.height = 64;
  const ctx = canvas2d.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0, 0, 256, 64);
  ctx.font = 'bold 28px Courier New';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(agent.name, 128, 28);
  ctx.font = '16px Courier New';
  ctx.fillStyle = `#${STATUS_COLORS[agent.status].toString(16).padStart(6,'0')}`;
  ctx.fillText(agent.role, 128, 50);
  
  const texture = new THREE.CanvasTexture(canvas2d);
  const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.set(0, 2.6, 0.3);
  sprite.scale.set(2.5, 0.6, 1);
  group.add(sprite);

  // Hover collision box (invisible)
  const hitGeo = new THREE.BoxGeometry(2.5, 2.5, 2);
  const hitMat = new THREE.MeshBasicMaterial({ visible: false });
  const hitBox = new THREE.Mesh(hitGeo, hitMat);
  hitBox.position.set(0, 1, 0);
  hitBox.userData.agentData = agent;
  hitBox.userData.parentGroup = group;
  group.add(hitBox);
  agentMeshes.push(hitBox);

  scene.add(group);
  agentObjects.push({ group, head, body, orb, orbLight, screen, agent });
  return group;
}

AGENTS.forEach(agent => createWorkstation(agent));

// ============================================================
// CENTRAL HOLOGRAM
// ============================================================
const holoGeo = new THREE.CylinderGeometry(0.05, 0.05, 3, 8);
const holoMat = new THREE.MeshBasicMaterial({ color: 0x06b6d4, transparent: true, opacity: 0.3 });
const holoBeam = new THREE.Mesh(holoGeo, holoMat);
holoBeam.position.set(0, 1.5, 0);
scene.add(holoBeam);

// Hologram rings
for (let i = 0; i < 4; i++) {
  const ringGeo = new THREE.TorusGeometry(1.5 - i * 0.3, 0.02, 8, 32);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x06b6d4, transparent: true, opacity: 0.2 - i * 0.04 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  ring.position.y = 1 + i * 0.4;
  holoBeam.add(ring);
}

// Hologram base
const baseGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.05, 32);
const baseMat = new THREE.MeshStandardMaterial({
  color: 0x06b6d4, transparent: true, opacity: 0.15,
  emissive: 0x06b6d4, emissiveIntensity: 0.3
});
const holoBase = new THREE.Mesh(baseGeo, baseMat);
holoBase.position.y = 0.025;
scene.add(holoBase);

// Central hologram logo text
const holoCenterLight = new THREE.PointLight(0x06b6d4, 4, 8);
holoCenterLight.position.set(0, 3, 0);
scene.add(holoCenterLight);

// ============================================================
// FLOATING PARTICLES
// ============================================================
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const particleColors = new Float32Array(particleCount * 3);

for (let i = 0; i < particleCount; i++) {
  positions[i * 3] = (Math.random() - 0.5) * 40;
  positions[i * 3 + 1] = Math.random() * 10;
  positions[i * 3 + 2] = (Math.random() - 0.5) * 40;
  const c = new THREE.Color([0x7c3aed, 0x06b6d4, 0x10b981][Math.floor(Math.random() * 3)]);
  particleColors[i * 3] = c.r;
  particleColors[i * 3 + 1] = c.g;
  particleColors[i * 3 + 2] = c.b;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

const particleMat = new THREE.PointsMaterial({
  size: 0.05, vertexColors: true, transparent: true, opacity: 0.6
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ============================================================
// CAMERA ORBIT CONTROLS (manual)
// ============================================================
let isOrbiting = false, isPanning = false;
let lastMouse = { x: 0, y: 0 };
let spherical = { theta: 0.3, phi: 0.7, r: 26 };
const target = new THREE.Vector3(0, 0, 0);

function updateCamera() {
  camera.position.x = target.x + spherical.r * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.position.y = target.y + spherical.r * Math.cos(spherical.phi);
  camera.position.z = target.z + spherical.r * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.lookAt(target);
}
updateCamera();

canvas.addEventListener('mousedown', e => {
  if (e.button === 0) isOrbiting = true;
  if (e.button === 2) isPanning = true;
  lastMouse = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('mouseup', () => { isOrbiting = false; isPanning = false; });
canvas.addEventListener('mousemove', e => {
  if (isOrbiting) {
    const dx = (e.clientX - lastMouse.x) * 0.005;
    const dy = (e.clientY - lastMouse.y) * 0.005;
    spherical.theta -= dx;
    spherical.phi = Math.max(0.1, Math.min(Math.PI * 0.45, spherical.phi + dy));
    updateCamera();
  }
  lastMouse = { x: e.clientX, y: e.clientY };
  checkHover(e);
});
canvas.addEventListener('wheel', e => {
  spherical.r = Math.max(8, Math.min(50, spherical.r + e.deltaY * 0.05));
  updateCamera();
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

document.getElementById('btn-reset').addEventListener('click', () => {
  spherical = { theta: 0.3, phi: 0.7, r: 26 };
  target.set(0, 0, 0);
  updateCamera();
});
document.getElementById('btn-top').addEventListener('click', () => {
  spherical = { theta: 0, phi: 0.1, r: 35 };
  updateCamera();
});

// ============================================================
// HOVER / TOOLTIP
// ============================================================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');

function checkHover(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(agentMeshes);
  if (hits.length > 0) {
    const agent = hits[0].object.userData.agentData;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY - 60) + 'px';
    document.getElementById('tt-name').textContent = agent.name;
    document.getElementById('tt-role').textContent = agent.role;
    document.getElementById('tt-status').textContent = agent.status.toUpperCase();
    document.getElementById('tt-task').textContent = '→ ' + agent.task;
    document.getElementById('tt-status').parentElement.style.color = '#' + STATUS_COLORS[agent.status].toString(16).padStart(6,'0');
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    canvas.style.cursor = 'default';
  }
}

// ============================================================
// CLOCK
// ============================================================
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s} PDT`;
}

// ============================================================
// ANIMATE
// ============================================================
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.016;

  // Animate agents
  agentObjects.forEach((obj, i) => {
    const offset = i * 0.7;
    // Head bobbing
    obj.head.position.y = 1.47 + Math.sin(t * 1.5 + offset) * 0.03;
    obj.body.position.y = 1.1 + Math.sin(t * 1.5 + offset) * 0.02;
    // Orb float
    obj.orb.position.y = 2.1 + Math.sin(t * 2 + offset) * 0.08;
    // Orb pulse
    const pulse = 0.7 + Math.sin(t * 3 + offset) * 0.3;
    obj.orb.material.opacity = pulse;
    obj.orbLight.intensity = pulse * 1.5;
    // Screen flicker
    if (obj.agent.status === 'processing') {
      obj.screen.material.opacity = 0.08 + Math.random() * 0.08;
    }
  });

  // Hologram rotate
  holoBeam.rotation.y = t * 0.5;
  holoCenterLight.intensity = 3 + Math.sin(t * 2) * 1;

  // Particles float
  const pos = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    pos[i * 3 + 1] += 0.005;
    if (pos[i * 3 + 1] > 10) pos[i * 3 + 1] = 0;
  }
  particles.geometry.attributes.position.needsUpdate = true;

  // Animate lights
  pointLight1.position.x = -10 + Math.sin(t * 0.3) * 3;
  pointLight2.position.z = 10 + Math.cos(t * 0.3) * 3;

  updateClock();
  renderer.render(scene, camera);
}

animate();

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
