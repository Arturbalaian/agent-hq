<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTBNCA HQ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;overflow:hidden;font-family:-apple-system,sans-serif;}
#c{display:block;width:100vw;height:100vh;}

#topbar{position:fixed;top:0;left:0;right:0;height:40px;z-index:20;
  background:rgba(8,8,16,0.95);border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;gap:0;}
#tb-logo{padding:0 16px;font-size:12px;font-weight:900;letter-spacing:3px;
  color:#fff;border-right:1px solid rgba(255,255,255,0.1);white-space:nowrap;}
#tb-agents{display:flex;align-items:center;flex:1;overflow-x:auto;padding:0 6px;gap:2px;}
#tb-agents::-webkit-scrollbar{display:none;}
.tba{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;
  cursor:pointer;transition:all 0.15s;border:1px solid transparent;white-space:nowrap;}
.tba:hover{background:rgba(255,255,255,0.07);}
.tba.sel{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.15);}
.tba-dot{width:6px;height:6px;border-radius:50%;}
.tba-name{font-size:11px;font-weight:700;color:rgba(255,255,255,0.8);}
.tba-st{font-size:9px;color:rgba(255,255,255,0.35);}
#tb-right{padding:0 14px;display:flex;align-items:center;gap:12px;
  border-left:1px solid rgba(255,255,255,0.08);white-space:nowrap;}
#tb-meet{font-size:10px;color:#4ade80;display:flex;align-items:center;gap:5px;letter-spacing:1px;}
.blink{animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
#tb-sb{font-size:10px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,0.6);
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
  padding:4px 10px;border-radius:5px;cursor:pointer;}

/* CHAT */
#chat{position:fixed;right:0;top:40px;bottom:0;width:300px;z-index:30;
  background:rgba(8,8,18,0.98);border-left:1px solid rgba(255,255,255,0.1);
  display:none;flex-direction:column;}
#chat.open{display:flex;}
#ch-h{padding:14px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px;}
#ch-av{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex-shrink:0;}
#ch-nm{font-size:14px;font-weight:800;}
#ch-rl{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px;}
#ch-x{margin-left:auto;background:none;border:none;color:rgba(255,255,255,0.3);font-size:18px;cursor:pointer;}
#ch-x:hover{color:#fff;}
#ch-ms{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
#ch-ms::-webkit-scrollbar{width:2px;}
#ch-ms::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);}
.cm{display:flex;gap:7px;animation:su 0.2s ease;}
@keyframes su{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.cm.me{flex-direction:row-reverse;}
.cm-av{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.cm-b{padding:8px 11px;border-radius:10px;font-size:12px;line-height:1.5;max-width:210px;}
.cm.bot .cm-b{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.88);border-radius:3px 10px 10px 10px;}
.cm.me .cm-b{background:linear-gradient(135deg,#5b21b6,#0e7490);color:#fff;border-radius:10px 3px 10px 10px;}
.cm-t{font-size:9px;color:rgba(255,255,255,0.2);margin-top:2px;}
.typing{display:flex;gap:3px;padding:8px 12px;}
.typing span{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.3);animation:tb 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
#ch-ir{padding:10px;border-top:1px solid rgba(255,255,255,0.08);display:flex;gap:7px;}
#ch-in{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;padding:7px 10px;color:#fff;font-size:12px;outline:none;resize:none;font-family:inherit;}
#ch-in::placeholder{color:rgba(255,255,255,0.2);}
#ch-sn{width:32px;height:32px;border-radius:7px;background:linear-gradient(135deg,#5b21b6,#0891b2);
  border:none;color:#fff;font-size:14px;cursor:pointer;}

/* STANDUP */
#sboard{position:fixed;right:300px;top:40px;bottom:0;width:260px;z-index:29;
  background:rgba(8,8,18,0.97);border-left:1px solid rgba(255,255,255,0.08);
  display:none;flex-direction:column;overflow-y:auto;}
#sboard.open{display:flex;}
#sb-h{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.08);font-size:11px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.7);}
.sb-c{margin:8px;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.02);}
.sb-n{font-size:11px;font-weight:800;margin-bottom:7px;}
.sb-r{font-size:10px;color:rgba(255,255,255,0.45);margin-bottom:3px;display:flex;gap:5px;}
.sb-r span:first-child{color:rgba(255,255,255,0.2);min-width:55px;}

/* TOOLTIP */
#tip{position:fixed;z-index:40;pointer-events:none;display:none;
  background:rgba(8,8,20,0.97);border:1px solid rgba(255,255,255,0.18);
  border-radius:10px;padding:10px 14px;min-width:160px;}
#tip-nm{font-size:14px;font-weight:900;margin-bottom:3px;}
#tip-rl{font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;}
#tip-tk{font-size:11px;color:rgba(255,255,255,0.7);}
#tip-ht{font-size:10px;color:rgba(168,85,247,0.6);margin-top:5px;}
</style>
</head>
<body>

<div id="topbar">
  <div id="tb-logo">✦ ARTBNCA HQ</div>
  <div id="tb-agents"></div>
  <div id="tb-right">
    <div id="tb-meet"><span class="blink">●</span><span id="meet-txt">All agents operational</span></div>
    <div id="tb-sb" onclick="toggleSB()">STANDUP</div>
  </div>
</div>

<canvas id="c"></canvas>

<div id="chat">
  <div id="ch-h">
    <div id="ch-av"></div>
    <div><div id="ch-nm"></div><div id="ch-rl"></div></div>
    <button id="ch-x" onclick="closeChat()">✕</button>
  </div>
  <div id="ch-ms"></div>
  <div id="ch-ir">
    <textarea id="ch-in" placeholder="Message..." rows="1"></textarea>
    <button id="ch-sn" onclick="sendMsg()">↑</button>
  </div>
</div>

<div id="sboard">
  <div id="sb-h">STANDUP BOARD</div>
  <div id="sb-content"></div>
</div>

<div id="tip">
  <div id="tip-nm"></div>
  <div id="tip-rl"></div>
  <div id="tip-tk"></div>
  <div id="tip-ht">Click to chat</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ======= AGENTS =======
const AGENTS = [
  {id:0,name:"Alpha",  role:"Director",       emoji:"👑",color:"#a78bfa",hex:0xa78bfa,status:"active",
   doing:"Orchestrating all operations",done:"Reviewed all tasks",blocker:"None",
   desk:[4,0],responses:["Все системы онлайн.","Делегирую задачи.","Система работает 24/7.","Следующий standup скоро."]},
  {id:1,name:"Beta",   role:"Content Creator",emoji:"🎨",color:"#38bdf8",hex:0x38bdf8,status:"active",
   doing:"Creating Border Security reels",done:"Generated 7 prompts",blocker:"None",
   desk:[-4,0],responses:["Промпты для рилсов готовы.","Tweety Bird в каждом кадре.","Border Security серия идёт.","7 промптов в очереди."]},
  {id:2,name:"Gamma",  role:"Video Producer", emoji:"🎬",color:"#4ade80",hex:0x4ade80,status:"processing",
   doing:"Processing Kling AI queue",done:"Rendered 3 clips",blocker:"API rate limit",
   desk:[4,4],responses:["Видео обрабатывается.","3 клипа в очереди.","Kling AI работает.","Последний ролик готов."]},
  {id:3,name:"Delta",  role:"Crypto Trader",  emoji:"📈",color:"#fbbf24",hex:0xfbbf24,status:"standby",
   doing:"Monitoring Kraken positions",done:"Checked all positions",blocker:"Low volatility",
   desk:[-4,4],responses:["Kraken баланс: $39.18.","SOL сигнал слабый.","Стоп-лосс активен.","Волатильность низкая."]},
  {id:4,name:"Epsilon",role:"Market Analyst", emoji:"🎯",color:"#fb923c",hex:0xfb923c,status:"standby",
   doing:"Analyzing Kalshi markets",done:"CPI report analyzed",blocker:"Waiting data",
   desk:[0,0],responses:["Kalshi позиция YES @ $0.78.","CPI выходит 10 апреля.","Confidence 73%.","Прогноз инфляции 3.1%."]},
  {id:5,name:"Zeta",   role:"Trend Scout",    emoji:"🔍",color:"#22d3ee",hex:0x22d3ee,status:"active",
   doing:"Monitoring Instagram trends",done:"Found eviction trend",blocker:"None",
   desk:[0,4],responses:["Border Security тренд +34%.","Алгоритм любит 7-9 сек.","US аудитория 22%.","Eviction series вирусит."]},
  {id:6,name:"Eta",    role:"Community Mgr",  emoji:"💬",color:"#34d399",hex:0x34d399,status:"active",
   doing:"Engaging Moltbook community",done:"Published 2 posts",blocker:"None",
   desk:[-8,0],responses:["Moltbook карма растёт.","2 поста опубликовано.","Engagement +12%.","4 упоминания сегодня."]},
  {id:7,name:"Theta",  role:"Image Generator",emoji:"✨",color:"#c084fc",hex:0xc084fc,status:"processing",
   doing:"Running Nano Banana queue",done:"4 images generated",blocker:"API limit",
   desk:[8,0],responses:["Nano Banana: 7 изображений.","Промпт отличный.","Tweety добавлен. ✅","4K рендер ~2 мин."]},
  {id:8,name:"Iota",   role:"Growth Marketer",emoji:"🚀",color:"#6ee7b7",hex:0x6ee7b7,status:"active",
   doing:"Optimizing @artbnca growth",done:"Posted 6 reels",blocker:"None",
   desk:[-8,4],responses:["@artbnca: 152K → 153.2K.","US +1.2%.","Лучшее время 9AM PT.","Border Security растёт."]},
  {id:9,name:"Kappa",  role:"Data Analyst",   emoji:"📊",color:"#67e8f9",hex:0x67e8f9,status:"processing",
   doing:"Analyzing audience metrics",done:"Calculated RPM",blocker:"Missing dataset",
   desk:[8,4],responses:["Охват +18%, engagement 4.2%.","Мексика 35%, США 22%.","RPM: $0.17-0.18.","Лучший пост: 24K views."]},
];
const SC = {active:0x4ade80,processing:0xa855f7,standby:0xfbbf24,idle:0x9ca3af};
const SCS = {active:"#4ade80",processing:"#a855f7",standby:"#fbbf24",idle:"#9ca3af"};

// ======= TOP BAR =======
const tbA = document.getElementById('tb-agents');
AGENTS.forEach(a=>{
  const d=document.createElement('div'); d.className='tba'; d.id=`tba${a.id}`;
  d.innerHTML=`<div class="tba-dot" style="background:${SCS[a.status]};box-shadow:0 0 5px ${SCS[a.status]}"></div><span class="tba-name">${a.name}</span><span class="tba-st">${a.status}</span>`;
  d.onclick=()=>openChat(a); tbA.appendChild(d);
});

// ======= STANDUP BOARD =======
document.getElementById('sb-content').innerHTML = AGENTS.map(a=>`
  <div class="sb-c">
    <div class="sb-n" style="color:${a.color}">${a.emoji} ${a.name}</div>
    <div class="sb-r"><span>Done:</span><span>${a.done}</span></div>
    <div class="sb-r"><span>Doing:</span><span>${a.doing}</span></div>
    <div class="sb-r"><span>Blocker:</span><span style="color:${a.blocker==='None'?'#4ade80':'#f87171'}">${a.blocker}</span></div>
  </div>`).join('');
let sbOpen=false;
function toggleSB(){sbOpen=!sbOpen;document.getElementById('sboard').classList.toggle('open',sbOpen);}

// ======= THREE.JS SETUP =======
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.4;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111118);
scene.fog = new THREE.Fog(0x111118,40,120);

// ISOMETRIC-LIKE CAMERA
const aspect = window.innerWidth/window.innerHeight;
const frustum = 16;
const camera = new THREE.OrthographicCamera(-frustum*aspect,frustum*aspect,frustum,-frustum,0.1,200);
camera.position.set(30,30,30);
camera.lookAt(0,0,0);

// ======= LIGHTING =======
scene.add(new THREE.AmbientLight(0xffeedd,1.2));
const sun=new THREE.DirectionalLight(0xfff5e0,2.5);
sun.position.set(20,30,20); sun.castShadow=true;
sun.shadow.mapSize.width=2048; sun.shadow.mapSize.height=2048;
sun.shadow.camera.near=0.1; sun.shadow.camera.far=100;
sun.shadow.camera.left=-25; sun.shadow.camera.right=25;
sun.shadow.camera.top=25; sun.shadow.camera.bottom=-25;
scene.add(sun);
const fill=new THREE.DirectionalLight(0xc8d8ff,0.8);
fill.position.set(-15,10,-10); scene.add(fill);
const rim=new THREE.DirectionalLight(0xffeecc,0.5);
rim.position.set(0,5,-20); scene.add(rim);

// ======= HELPERS =======
function box(w,h,d,color,emissive=0x000000,emissInt=0){
  return new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    new THREE.MeshLambertMaterial({color,emissive,emissiveIntensity:emissInt})
  );
}
function addShadow(mesh){mesh.castShadow=true;mesh.receiveShadow=true;return mesh;}

// ======= FLOOR =======
const floor=addShadow(box(34,0.15,24,0xf0ebe0));
floor.position.y=-0.075; scene.add(floor);

// Floor tile lines
const floorGrid=new THREE.GridHelper(34,17,0x000000,0x000000);
floorGrid.material.opacity=0.04; floorGrid.material.transparent=true;
floorGrid.position.y=0.01; scene.add(floorGrid);

// ======= WALLS =======
// Back wall (Z-)
const wBack=addShadow(box(34,5,0.2,0xd8d4cc));
wBack.position.set(0,2.5,-12.1); scene.add(wBack);
// Left wall (X-)
const wLeft=addShadow(box(0.2,5,24,0xcfcbc3));
wLeft.position.set(-17.1,2.5,0); scene.add(wLeft);
// Right wall
const wRight=addShadow(box(0.2,5,24,0xcfcbc3));
wRight.position.set(17.1,2.5,0); scene.add(wRight);
// Front wall partial
const wFront=addShadow(box(34,5,0.2,0xd0ccC4));
wFront.position.set(0,2.5,12.1); scene.add(wFront);

// ======= FURNITURE HELPERS =======
function makeDesk(x,z){
  const g=new THREE.Group(); g.position.set(x,0,z);
  // Table top
  const top=addShadow(box(2.4,0.12,1.4,0x8B6914)); top.position.y=0.76; g.add(top);
  // Legs
  [[0.9,-0.5],[0.9,0.5],[-0.9,-0.5],[-0.9,0.5]].forEach(([lx,lz])=>{
    const leg=box(0.1,0.76,0.1,0x5a4510); leg.position.set(lx,0.38,lz); g.add(leg);
  });
  // Monitor
  const mBack=addShadow(box(0.9,0.6,0.06,0x1a1a1a)); mBack.position.set(0,1.16,-0.4); g.add(mBack);
  const mScr=box(0.8,0.52,0.01,0x4ade80); mScr.material.emissive=new THREE.Color(0x4ade80); mScr.material.emissiveIntensity=0.15;
  mScr.position.set(0,1.16,-0.37); g.add(mScr);
  const mStand=box(0.08,0.18,0.08,0x333); mStand.position.set(0,0.85,-0.4); g.add(mStand);
  // Chair
  const cSeat=addShadow(box(0.7,0.08,0.7,0x3d4f6b)); cSeat.position.set(0,0.46,0.7); g.add(cSeat);
  const cBack=addShadow(box(0.7,0.5,0.06,0x334466)); cBack.position.set(0,0.71,0.35); g.add(cBack);
  [[0.25,0.36,0.25],[0.25,0.36,-0.25],[-0.25,0.36,0.25],[-0.25,0.36,-0.25]].forEach(([cx,cy,cz])=>{
    const cl=box(0.06,0.46,0.06,0x222); cl.position.set(cx+0,cy,cz+0.7); g.add(cl);
  });
  scene.add(g); return g;
}

function makeRoundTable(x,z){
  const g=new THREE.Group(); g.position.set(x,0,z);
  const top=addShadow(new THREE.Mesh(new THREE.CylinderGeometry(1.8,1.8,0.12,32),new THREE.MeshLambertMaterial({color:0x8B5E3C})));
  top.position.y=0.76; g.add(top);
  const leg=addShadow(box(0.12,0.76,0.12,0x5a3a20)); leg.position.y=0.38; g.add(leg);
  const base=addShadow(new THREE.Mesh(new THREE.CylinderGeometry(0.6,0.6,0.06,12),new THREE.MeshLambertMaterial({color:0x4a2a10})));
  base.position.y=0.03; g.add(base);
  // Chairs around table
  for(let i=0;i<6;i++){
    const angle=i*(Math.PI/3);
    const cs=addShadow(box(0.55,0.07,0.55,0x3d4f6b));
    cs.position.set(Math.sin(angle)*2.4,0.46,Math.cos(angle)*2.4); g.add(cs);
    const cb=addShadow(box(0.55,0.4,0.06,0x334466));
    cb.position.set(Math.sin(angle)*2.4,0.66,Math.cos(angle)*2.4+0.3); cb.rotation.y=angle; g.add(cb);
  }
  scene.add(g); return g;
}

function makeSofa(x,z,rotY=0){
  const g=new THREE.Group(); g.position.set(x,0,z); g.rotation.y=rotY;
  const seat=addShadow(box(2.4,0.3,0.9,0x3b5ea6)); seat.position.y=0.3; g.add(seat);
  const back=addShadow(box(2.4,0.6,0.22,0x2d4a8a)); back.position.set(0,0.75,-0.34); g.add(back);
  const al=addShadow(box(0.22,0.5,0.9,0x4a6abb)); al.position.set(-1.31,0.55,0); g.add(al);
  const ar=addShadow(box(0.22,0.5,0.9,0x4a6abb)); ar.position.set(1.31,0.55,0); g.add(ar);
  // 2 cushions
  const cu1=addShadow(box(0.9,0.15,0.7,0x4a6abb)); cu1.position.set(-0.65,0.48,0.05); g.add(cu1);
  const cu2=addShadow(box(0.9,0.15,0.7,0x4a6abb)); cu2.position.set(0.65,0.48,0.05); g.add(cu2);
  scene.add(g);
}

function makePlant(x,z){
  const g=new THREE.Group(); g.position.set(x,0,z);
  const pot=addShadow(new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.14,0.35,8),new THREE.MeshLambertMaterial({color:0x8B4513})));
  pot.position.y=0.175; g.add(pot);
  const soil=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.18,0.04,8),new THREE.MeshLambertMaterial({color:0x3d2b10}));
  soil.position.y=0.37; g.add(soil);
  [[0,0.7,0],[0.18,0.55,0.1],[-0.18,0.55,-0.1],[0.1,0.6,-0.15]].forEach(([lx,ly,lz])=>{
    const leaf=addShadow(new THREE.Mesh(new THREE.SphereGeometry(0.18,6,6),new THREE.MeshLambertMaterial({color:0x2d7a3a})));
    leaf.position.set(lx,ly,lz); g.add(leaf);
  });
  scene.add(g);
}

function makeBookshelf(x,z){
  const g=new THREE.Group(); g.position.set(x,0,z);
  const frame=addShadow(box(1.8,2.2,0.4,0x6B4F10)); frame.position.y=1.1; g.add(frame);
  const colors=[0xd9534f,0x5ba5d9,0x5cb85c,0xf0ad4e,0xaa66cc,0xd9534f];
  for(let i=0;i<3;i++){
    for(let j=0;j<3;j++){
      const bk=box(0.25,0.3,0.28,colors[(i*3+j)%6]);
      bk.position.set(-0.6+j*0.6,0.4+i*0.65,-0.02); g.add(bk);
    }
  }
  scene.add(g);
}

function makeTV(x,y,z,rotY=0){
  const g=new THREE.Group(); g.position.set(x,y,z); g.rotation.y=rotY;
  const frm=box(1.8,1.0,0.06,0x1a1a1a); g.add(frm);
  const scr=box(1.65,0.88,0.01,0x1a3a5a); scr.material.emissive=new THREE.Color(0x1a4060); scr.material.emissiveIntensity=0.4;
  scr.position.z=0.04; g.add(scr);
  const stnd=box(0.08,0.3,0.08,0x333); stnd.position.set(0,-0.65,0); g.add(stnd);
  const base=box(0.5,0.04,0.3,0x333); base.position.set(0,-0.82,0); g.add(base);
  scene.add(g);
}

// ======= BUILD OFFICE =======
// 10 desks
AGENTS.forEach(a=>{
  a.deskMesh=makeDesk(a.desk[0], a.desk[1]);

});
// Round meeting table center
makeRoundTable(0,8);
// Sofas
makeSofa(-12,-2,Math.PI/2);
makeSofa(12,-2,-Math.PI/2);
makeSofa(0,-9,0);
// Plants corners
makePlant(-15,-10); makePlant(15,-10); makePlant(-15,10); makePlant(15,10);
makePlant(-8,-10); makePlant(8,-10);
// Bookshelves
makeBookshelf(-16,3); makeBookshelf(-16,-4);
// TVs on walls
makeTV(-16.8,3,-5,Math.PI/2);
makeTV(16.8,3,0,-Math.PI/2);
makeTV(-2,3.5,-12,0);
// Whiteboard
const wb=addShadow(box(3,1.8,0.06,0xf0f0f0)); wb.position.set(6,2.5,-11.9); scene.add(wb);
const wbCont=box(2.7,1.5,0.01,0xe8e8f5); wbCont.material.emissive=new THREE.Color(0xc8c8dd); wbCont.material.emissiveIntensity=0.1;
wbCont.position.set(6,2.5,-11.85); scene.add(wbCont);
// Reception desk
const rcpt=addShadow(box(3,1.0,1.4,0x8B6914)); rcpt.position.set(11,0.5,0); scene.add(rcpt);
const rcptTop=addShadow(box(3,0.08,1.8,0x6B4F10)); rcptTop.position.set(11,1.04,0); scene.add(rcptTop);

// ======= AGENT MESHES =======
const agentObjs=[];
AGENTS.forEach(a=>{
  const g=new THREE.Group();
  // Legs
  const legL=box(0.18,0.38,0.18,a.hex); legL.position.set(-0.12,0.19,0); g.add(legL);
  const legR=box(0.18,0.38,0.18,a.hex); legR.position.set(0.12,0.19,0); g.add(legR);
  // Body
  const body=addShadow(box(0.44,0.5,0.28,a.hex)); body.position.y=0.63; g.add(body);
  // Head
  const head=addShadow(new THREE.Mesh(new THREE.BoxGeometry(0.36,0.32,0.32),new THREE.MeshLambertMaterial({color:a.hex,emissive:new THREE.Color(a.hex),emissiveIntensity:0.15})));
  head.position.y=1.04; g.add(head);
  // Eyes
  const eyeMat=new THREE.MeshBasicMaterial({color:0xffffff});
  const eyeL=new THREE.Mesh(new THREE.BoxGeometry(0.07,0.05,0.01),eyeMat); eyeL.position.set(-0.08,1.07,0.165); g.add(eyeL);
  const eyeR=new THREE.Mesh(new THREE.BoxGeometry(0.07,0.05,0.01),eyeMat); eyeR.position.set(0.08,1.07,0.165); g.add(eyeR);
  // Pupils
  const pupMat=new THREE.MeshBasicMaterial({color:0x111});
  const pL=new THREE.Mesh(new THREE.BoxGeometry(0.03,0.03,0.01),pupMat); pL.position.set(-0.08,1.07,0.17); g.add(pL);
  const pR=new THREE.Mesh(new THREE.BoxGeometry(0.03,0.03,0.01),pupMat); pR.position.set(0.08,1.07,0.17); g.add(pR);
  // Status orb
  const orb=new THREE.Mesh(new THREE.SphereGeometry(0.07,8,8),new THREE.MeshBasicMaterial({color:SC[a.status]}));
  orb.position.y=1.45; g.add(orb);
  const orbLight=new THREE.PointLight(SC[a.status],0.8,1.5);
  orbLight.position.y=1.45; g.add(orbLight);
  // Name sprite
  const nc=document.createElement('canvas'); nc.width=128; nc.height=32;
  const nctx=nc.getContext('2d');
  nctx.fillStyle='rgba(0,0,0,0.7)'; nctx.roundRect(0,4,128,24,6); nctx.fill();
  nctx.font='bold 18px -apple-system,sans-serif'; nctx.textAlign='center'; nctx.fillStyle=a.color;
  nctx.fillText(a.name,64,22);
  const ntx=new THREE.CanvasTexture(nc);
  const ns=new THREE.Sprite(new THREE.SpriteMaterial({map:ntx,transparent:true}));
  ns.position.y=1.7; ns.scale.set(1.2,0.3,1); g.add(ns);

  g.position.set(a.desk[0]+0.5, 0, a.desk[1]+0.5);
  g.userData.agent=a;
  scene.add(g);

  a.px=a.desk[0]+0.5; a.pz=a.desk[1]+0.5;
  a.tx=a.px; a.tz=a.pz;
  a.walking=false; a.idle=80+Math.random()*200; a.bp=Math.random()*Math.PI*2;
  a.inMeeting=false;
  agentObjs.push({g,legL,legR,body,head,orb,orbLight,a});
});

// ======= CLICK OBJECTS =======
const clickable=[];
agentObjs.forEach(({g,a})=>{
  const hit=new THREE.Mesh(new THREE.BoxGeometry(1,2,1),new THREE.MeshBasicMaterial({visible:false}));
  hit.position.set(0,0.5,0); hit.userData.agent=a; g.add(hit); clickable.push(hit);
});

// ======= MEETING SPOTS =======
const MEETING=[];
for(let i=0;i<10;i++){
  const angle=i*(Math.PI*2/10);
  MEETING.push([Math.cos(angle)*2.5, Math.sin(angle)*2.5]);
}

// ======= STANDUP TIMER =======
let meetTimer=0, meetInterval=700, meetActive=false;
const meetTxt=document.getElementById('meet-txt');

function triggerMeeting(){
  meetActive=true; meetTimer=0; meetInterval=500+Math.random()*400;
  meetTxt.textContent='📋 Standup starting...';
  AGENTS.forEach((a,i)=>{
    setTimeout(()=>{
      const mp=MEETING[i%MEETING.length];
      a.tx=mp[0]; a.tz=8+mp[1]; a.walking=true; a.inMeeting=true;
    },i*250);
  });
  setTimeout(()=>meetTxt.textContent='🗣 Standup in progress...',2500);
  setTimeout(()=>{
    meetActive=false;
    meetTxt.textContent='✅ Agents back to work';
    AGENTS.forEach((a,i)=>setTimeout(()=>{a.tx=a.desk[0]+0.5; a.tz=a.desk[1]+0.5; a.walking=true; a.inMeeting=false;},i*200));
    setTimeout(()=>meetTxt.textContent='All agents operational',5000);
  },12000);
}

// ======= ANIMATE =======
let lt=0;
function animate(t=0){
  requestAnimationFrame(animate);
  const dt=Math.min((t-lt)/1000,0.05); lt=t;

  agentObjs.forEach(({g,legL,legR,body,head,orb,orbLight,a})=>{
    a.bp+=dt*3;
    const bob=Math.sin(a.bp)*0.025;
    // Move
    if(a.walking){
      const dx=a.tx-a.px, dz=a.tz-a.pz;
      const dist=Math.sqrt(dx*dx+dz*dz);
      if(dist<0.05){a.px=a.tx;a.pz=a.tz;a.walking=false;}
      else{
        const spd=2.5*dt;
        a.px+=dx/dist*spd; a.pz+=dz/dist*spd;
        // Walk animation
        legL.position.x=-0.12+Math.sin(a.bp*3)*0.08;
        legR.position.x=0.12-Math.sin(a.bp*3)*0.08;
        legL.position.z=Math.sin(a.bp*3)*0.1;
        legR.position.z=-Math.sin(a.bp*3)*0.1;
        // Face direction
        const angle=Math.atan2(dx,dz);
        g.rotation.y=angle;
      }
    } else {
      a.idle-=dt*60;
      if(a.idle<=0&&!a.inMeeting){
        a.idle=100+Math.random()*300;
        if(Math.random()<0.35){
          a.tx=a.desk[0]+(Math.random()-0.5)*2;
          a.tz=a.desk[1]+(Math.random()-0.5)*2;
          a.walking=true;
        }
      }
    }
    g.position.set(a.px,bob,a.pz);
    head.position.y=1.04+bob;
    body.position.y=0.63+bob*0.5;
    // Orb pulse
    const op=0.7+Math.sin(t*0.003+a.bp)*0.3;
    orb.material.opacity=op;
    orbLight.intensity=op*1.2;
  });

  // Meeting trigger
  if(!meetActive){
    meetTimer+=dt*60;
    if(meetTimer>meetInterval)triggerMeeting();
  }

  renderer.render(scene,camera);
}
animate();

// ======= RESIZE =======
function onResize(){
  const w=window.innerWidth, h=window.innerHeight;
  renderer.setSize(w,h);
  const a=w/h;
  camera.left=-frustum*a; camera.right=frustum*a;
  camera.top=frustum; camera.bottom=-frustum;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize',onResize); onResize();

// ======= ORBIT CONTROLS =======
let isDragging=false,lastX=0,lastY=0;
const theta={v:Math.PI/4}, phi={v:Math.PI/3}, radius={v:45};

function updateCam(){
  camera.position.x=Math.sin(theta.v)*Math.cos(phi.v)*radius.v;
  camera.position.y=Math.sin(phi.v)*radius.v;
  camera.position.z=Math.cos(theta.v)*Math.cos(phi.v)*radius.v;
  camera.lookAt(0,2,3);
}
updateCam();

const cv=document.getElementById('c');
cv.addEventListener('mousedown',e=>{isDragging=true;lastX=e.clientX;lastY=e.clientY;});
window.addEventListener('mouseup',()=>isDragging=false);
cv.addEventListener('mousemove',e=>{
  if(isDragging){
    theta.v-=(e.clientX-lastX)*0.006;
    phi.v=Math.max(0.15,Math.min(Math.PI/2.2,phi.v-(e.clientY-lastY)*0.006));
    lastX=e.clientX; lastY=e.clientY; updateCam();
  }
  checkHover(e);
});
cv.addEventListener('wheel',e=>{
  radius.v=Math.max(15,Math.min(70,radius.v+e.deltaY*0.08));
  updateCam(); e.preventDefault();
},{passive:false});

// ======= HOVER & CLICK =======
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
const tip=document.getElementById('tip');

function checkHover(e){
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(clickable,false);
  if(hits.length){
    const a=hits[0].object.userData.agent;
    tip.style.display='block';
    tip.style.left=(e.clientX+14)+'px';
    tip.style.top=(e.clientY-80)+'px';
    document.getElementById('tip-nm').textContent=a.name;
    document.getElementById('tip-nm').style.color=a.color;
    document.getElementById('tip-rl').textContent=a.role;
    document.getElementById('tip-tk').textContent='→ '+a.doing;
    cv.style.cursor='pointer';
  } else {
    tip.style.display='none';
    cv.style.cursor=isDragging?'grabbing':'default';
  }
}
cv.addEventListener('click',e=>{
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(clickable,false);
  if(hits.length)openChat(hits[0].object.userData.agent);
});

// ======= CHAT =======
let activeA=null;
function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}
function ts(){const n=new Date();return`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;}

function openChat(a){
  activeA=a;
  document.querySelectorAll('.tba').forEach(b=>b.classList.remove('sel'));
  document.getElementById(`tba${a.id}`)?.classList.add('sel');
  document.getElementById('chat').classList.add('open');
  const av=document.getElementById('ch-av');
  av.textContent=a.emoji; av.style.background=a.color+'22'; av.style.border=`1px solid ${a.color}44`; av.style.color=a.color;
  document.getElementById('ch-nm').textContent=a.name; document.getElementById('ch-nm').style.color=a.color;
  document.getElementById('ch-rl').textContent=a.role;
  document.getElementById('ch-ms').innerHTML='';
  setTimeout(()=>{showTyping();setTimeout(()=>{rmTyping();addMsg(a,rnd(a.responses),'bot');},700+Math.random()*400);},200);
}
function closeChat(){
  document.getElementById('chat').classList.remove('open');
  document.querySelectorAll('.tba').forEach(b=>b.classList.remove('sel'));
  activeA=null;
}
function addMsg(a,text,type){
  const ms=document.getElementById('ch-ms');
  const d=document.createElement('div'); d.className=`cm ${type}`;
  if(type==='bot') d.innerHTML=`<div class="cm-av" style="background:${a.color}22;border:1px solid ${a.color}33;color:${a.color}">${a.emoji}</div><div><div class="cm-b">${text}</div><div class="cm-t">${ts()}</div></div>`;
  else d.innerHTML=`<div><div class="cm-b">${text}</div><div class="cm-t" style="text-align:right">${ts()}</div></div><div class="cm-av" style="background:#5b21b622;color:#a78bfa">A</div>`;
  ms.appendChild(d); ms.scrollTop=ms.scrollHeight;
}
function showTyping(){
  if(!activeA)return;
  const ms=document.getElementById('ch-ms');
  const d=document.createElement('div'); d.className='cm bot'; d.id='typ';
  d.innerHTML=`<div class="cm-av" style="background:${activeA.color}22;color:${activeA.color}">${activeA.emoji}</div><div class="cm-b"><div class="typing"><span></span><span></span><span></span></div></div>`;
  ms.appendChild(d); ms.scrollTop=ms.scrollHeight;
}
function rmTyping(){const e=document.getElementById('typ');if(e)e.remove();}
function sendMsg(){
  const inp=document.getElementById('ch-in'); const txt=inp.value.trim();
  if(!txt||!activeA)return; inp.value='';
  addMsg(activeA,txt,'me'); showTyping();
  setTimeout(()=>{rmTyping();addMsg(activeA,rnd(activeA.responses),'bot');},500+Math.random()*700);
}
document.getElementById('ch-in').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
</script>
