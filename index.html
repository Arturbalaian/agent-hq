<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTBNCA — Agent HQ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080818; overflow: hidden; font-family: -apple-system, 'SF Pro Display', sans-serif; }
canvas { display: block; }

#hud {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 28px;
  background: linear-gradient(180deg, rgba(5,5,20,0.95) 0%, transparent 100%);
  z-index: 10; pointer-events: none;
}
#logo {
  font-size: 20px; font-weight: 900; letter-spacing: 4px;
  background: linear-gradient(90deg, #a855f7, #22d3ee);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 16px rgba(168,85,247,0.9));
}
#clock { font-size: 13px; color: rgba(255,255,255,0.6); letter-spacing: 2px; font-weight: 500; }
#status { font-size: 12px; color: #34d399; letter-spacing: 2px; display: flex; align-items: center; gap: 8px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #34d399; animation: blink 1.5s infinite; box-shadow: 0 0 8px #34d399; }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

/* CHAT PANEL */
#chat-panel {
  position: fixed; right: 0; top: 0; bottom: 0; width: 360px;
  background: rgba(8,8,28,0.97);
  border-left: 1px solid rgba(168,85,247,0.3);
  display: none; flex-direction: column; z-index: 50;
  backdrop-filter: blur(20px);
}
#chat-panel.open { display: flex; }
#chat-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid rgba(168,85,247,0.2);
  display: flex; align-items: center; gap: 12px;
}
#chat-avatar {
  width: 46px; height: 46px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 900; color: #fff;
  flex-shrink: 0;
}
#chat-agent-name { font-size: 16px; font-weight: 800; color: #fff; }
#chat-agent-role { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 1px; margin-top: 2px; }
#chat-close {
  margin-left: auto; background: none; border: none; color: rgba(255,255,255,0.4);
  font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 8px;
  transition: all 0.2s;
}
#chat-close:hover { background: rgba(255,255,255,0.1); color: #fff; }

#chat-messages {
  flex: 1; overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column; gap: 14px;
}
#chat-messages::-webkit-scrollbar { width: 4px; }
#chat-messages::-webkit-scrollbar-track { background: transparent; }
#chat-messages::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.4); border-radius: 2px; }

.msg { display: flex; gap: 10px; max-width: 100%; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.msg.user { flex-direction: row-reverse; }
.msg-avatar { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; }
.msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.5; max-width: 260px; }
.msg.agent .msg-bubble { background: rgba(168,85,247,0.15); border: 1px solid rgba(168,85,247,0.25); color: rgba(255,255,255,0.9); border-radius: 4px 14px 14px 14px; }
.msg.user .msg-bubble { background: linear-gradient(135deg, #7c3aed, #0891b2); color: #fff; border-radius: 14px 4px 14px 14px; }
.msg-time { font-size: 10px; color: rgba(255,255,255,0.25); margin-top: 4px; }

#chat-input-area {
  padding: 16px;
  border-top: 1px solid rgba(168,85,247,0.2);
  display: flex; gap: 10px; align-items: flex-end;
}
#chat-input {
  flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px; padding: 10px 14px; color: #fff; font-size: 14px;
  resize: none; max-height: 100px; min-height: 40px;
  outline: none; font-family: inherit; transition: border-color 0.2s;
}
#chat-input:focus { border-color: rgba(168,85,247,0.5); }
#chat-input::placeholder { color: rgba(255,255,255,0.25); }
#chat-send {
  width: 40px; height: 40px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, #7c3aed, #0891b2);
  color: #fff; font-size: 18px; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; box-shadow: 0 0 16px rgba(124,58,237,0.5);
}
#chat-send:hover { transform: scale(1.05); box-shadow: 0 0 24px rgba(124,58,237,0.8); }

/* AGENT CARDS */
#agent-grid {
  position: fixed; left: 0; top: 0; bottom: 0; width: 220px;
  background: rgba(5,5,18,0.95);
  border-right: 1px solid rgba(168,85,247,0.2);
  overflow-y: auto; z-index: 10; padding: 70px 12px 20px;
  backdrop-filter: blur(20px);
}
#agent-grid::-webkit-scrollbar { width: 3px; }
#agent-grid::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.3); border-radius: 2px; }
.agent-card {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; border-radius: 12px; cursor: pointer;
  transition: all 0.2s; margin-bottom: 6px;
  border: 1px solid transparent;
}
.agent-card:hover { background: rgba(168,85,247,0.12); border-color: rgba(168,85,247,0.3); }
.agent-card.selected { background: rgba(168,85,247,0.2); border-color: rgba(168,85,247,0.5); }
.agent-card-avatar { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; color: #fff; flex-shrink: 0; }
.agent-card-info { flex: 1; min-width: 0; }
.agent-card-name { font-size: 13px; font-weight: 800; color: #fff; }
.agent-card-role { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.agent-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* Controls */
#controls {
  position: fixed; bottom: 24px; right: 24px; z-index: 10;
  display: flex; flex-direction: column; gap: 8px;
}
.ctrl-btn {
  width: 42px; height: 42px; border-radius: 12px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.7); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.ctrl-btn:hover { background: rgba(168,85,247,0.3); border-color: rgba(168,85,247,0.6); color: #fff; }

/* Legend */
#legend {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 20px; z-index: 10; pointer-events: none;
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: uppercase; }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; }

/* Typing indicator */
.typing { display: flex; gap: 4px; padding: 12px 14px; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: rgba(168,85,247,0.6); animation: typingBounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
</style>
</head>
<body>

<div id="hud">
  <div id="logo">✦ ARTBNCA HQ</div>
  <div id="clock"></div>
  <div id="status"><div class="dot"></div><span>12 AGENTS ONLINE</span></div>
</div>

<!-- Sidebar agent list -->
<div id="agent-grid"></div>

<!-- 3D Canvas -->
<canvas id="canvas"></canvas>

<!-- Chat Panel -->
<div id="chat-panel">
  <div id="chat-header">
    <div id="chat-avatar"></div>
    <div>
      <div id="chat-agent-name"></div>
      <div id="chat-agent-role"></div>
    </div>
    <button id="chat-close" onclick="closeChat()">✕</button>
  </div>
  <div id="chat-messages"></div>
  <div id="chat-input-area">
    <textarea id="chat-input" placeholder="Ask anything..." rows="1"></textarea>
    <button id="chat-send" onclick="sendMessage()">↑</button>
  </div>
</div>

<div id="controls">
  <button class="ctrl-btn" onclick="resetCamera()" title="Reset">⌂</button>
  <button class="ctrl-btn" onclick="topView()" title="Top view">↕</button>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div>Active</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a855f7"></div>Processing</div>
  <div class="legend-item"><div class="legend-dot" style="background:#22d3ee"></div>Standby</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Idle</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ==================== AGENTS ====================
const AGENTS = [
  { id:0,  name:"ARTY",   role:"Chief Director",    emoji:"👑", color:"#a855f7", hex:0xa855f7, status:"active",     task:"Orchestrating all operations",        pos:[0,0,0]     },
  { id:1,  name:"NOVA",   role:"Content Creator",   emoji:"🎨", color:"#22d3ee", hex:0x22d3ee, status:"active",     task:"Generating AI prompts for reels",     pos:[-5,0,-4]   },
  { id:2,  name:"BLADE",  role:"Video Editor",      emoji:"🎬", color:"#34d399", hex:0x34d399, status:"processing", task:"Processing Kling AI video clips",     pos:[5,0,-4]    },
  { id:3,  name:"SCOUT",  role:"Trend Analyst",     emoji:"🔍", color:"#22d3ee", hex:0x22d3ee, status:"active",     task:"Monitoring Instagram trends",         pos:[-8,0,0]    },
  { id:4,  name:"KRYPTO", role:"Crypto Trader",     emoji:"📈", color:"#f59e0b", hex:0xf59e0b, status:"standby",   task:"Watching Kraken positions",           pos:[8,0,0]     },
  { id:5,  name:"KALSHI", role:"Market Predictor",  emoji:"🎯", color:"#f59e0b", hex:0xf59e0b, status:"standby",   task:"Analyzing prediction markets",        pos:[8,0,4]     },
  { id:6,  name:"MOLTI",  role:"Community Manager", emoji:"💬", color:"#34d399", hex:0x34d399, status:"active",     task:"Engaging community on Moltbook",     pos:[-8,0,4]    },
  { id:7,  name:"SCRIBE", role:"Secretary",         emoji:"📋", color:"#22d3ee", hex:0x22d3ee, status:"active",     task:"Managing tasks and scheduling",       pos:[-5,0,4]    },
  { id:8,  name:"LEXUS",  role:"Legal Advisor",     emoji:"⚖️", color:"#ec4899", hex:0xec4899, status:"idle",      task:"Reviewing visa documents",            pos:[5,0,4]     },
  { id:9,  name:"FLUX",   role:"Image Generator",   emoji:"✨", color:"#a855f7", hex:0xa855f7, status:"processing", task:"Running Nano Banana image queue",     pos:[0,0,-7]    },
  { id:10, name:"ARCHER", role:"Growth Marketer",   emoji:"🚀", color:"#34d399", hex:0x34d399, status:"active",     task:"Growing @artbnca to 200K followers", pos:[-3,0,7]    },
  { id:11, name:"AXIOM",  role:"Data Analyst",      emoji:"📊", color:"#22d3ee", hex:0x22d3ee, status:"processing", task:"Analyzing audience metrics",          pos:[3,0,7]     },
];

const STATUS_COLORS = { active:0x34d399, processing:0xa855f7, standby:0x22d3ee, idle:0xf59e0b };
const STATUS_HEX = { active:"#34d399", processing:"#a855f7", standby:"#22d3ee", idle:"#f59e0b" };

const RESPONSES = {
  ARTY:   ["Управляю всеми агентами. Что нужно?", "Делегирую задачи оптимально. Скажи приоритет.", "Мониторю систему 24/7. Всё под контролем."],
  NOVA:   ["Генерирую промпты для твоих рилсов прямо сейчас.", "Tweety Bird в каждый кадр — помню 😄", "Новый формат Border Security готов к тестированию."],
  BLADE:  ["Клип обрабатывается в Kling AI. ~3 минуты.", "5-секундный ролик готов. Проверяй качество.", "Добавил переходы. Выглядит профессионально."],
  SCOUT:  ["Тренд Border Security растёт +34% за неделю.", "Instagram алгоритм сейчас любит вертикальные 7-9 секунд.", "Конкуренты набирают на Gritty формате. Надо ускориться."],
  KRYPTO: ["Kraken: баланс $39.18. Позиции стабильны.", "SOL показывает сигнал. Жду подтверждения.", "Шиткоины в минусе 3%. Держу стоп-лосс."],
  KALSHI: ["Prediction market: CPI данные выходят 10 апреля.", "Моя позиция YES @ $0.78 — всё ещё в плюсе.", "Новый сигнал confidence 73%. Ставку?"],
  MOLTI:  ["Moltbook: 2 новых комментария, карма растёт.", "Опубликовал пост про AI heartbeat. Реакции хорошие.", "Community engagement +12% за неделю."],
  SCRIBE: ["Задачи обновлены. 3 в очереди, 1 в процессе.", "Напоминание: DS-160 для папы нужно заполнить.", "Расписание на неделю сформировано."],
  LEXUS:  ["Документы в порядке. Виза — нужны даты поездки.", "Юридических рисков не обнаружено.", "DS-160: нужен отель и даты. Остальное готово."],
  FLUX:   ["Nano Banana очередь: 7 изображений, готово 4.", "Последний промпт дал отличный результат.", "Tweety Bird добавлен в каждую сцену. ✅"],
  ARCHER: ["@artbnca: 152K → 153.2K за неделю. Растём.", "US аудитория +1.2%. Border Security работает.", "Рекомендую постить в 9AM PT — пиковое время."],
  AXIOM:  ["Метрики: охват +18%, engagement 4.2%.", "Мексика 35%, США 22% — US растёт.", "Лучший пост недели: Border Security с Tweety. 24K views."],
};

// ==================== BUILD SIDEBAR ====================
const grid = document.getElementById('agent-grid');
AGENTS.forEach(a => {
  const card = document.createElement('div');
  card.className = 'agent-card';
  card.id = `card-${a.id}`;
  card.innerHTML = `
    <div class="agent-card-avatar" style="background:${a.color}22;border:1px solid ${a.color}44">${a.emoji}</div>
    <div class="agent-card-info">
      <div class="agent-card-name">${a.name}</div>
      <div class="agent-card-role">${a.role}</div>
    </div>
    <div class="agent-status-dot" style="background:${STATUS_HEX[a.status]};box-shadow:0 0 6px ${STATUS_HEX[a.status]}"></div>
  `;
  card.onclick = () => openChat(a);
  grid.appendChild(card);
});

// ==================== CHAT ====================
let currentAgent = null;

function openChat(agent) {
  currentAgent = agent;
  // Update selected card
  document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('selected'));
  document.getElementById(`card-${agent.id}`).classList.add('selected');
  
  // Open panel
  document.getElementById('chat-panel').classList.add('open');
  document.getElementById('chat-avatar').textContent = agent.emoji;
  document.getElementById('chat-avatar').style.background = agent.color + '33';
  document.getElementById('chat-avatar').style.border = `1px solid ${agent.color}66`;
  document.getElementById('chat-agent-name').textContent = agent.name;
  document.getElementById('chat-agent-role').textContent = agent.role;
  
  const msgs = document.getElementById('chat-messages');
  msgs.innerHTML = '';
  
  // Initial greeting
  setTimeout(() => {
    showTyping();
    setTimeout(() => {
      removeTyping();
      addMessage(agent, getRandomResponse(agent), 'agent');
    }, 1000);
  }, 300);
}

function closeChat() {
  document.getElementById('chat-panel').classList.remove('open');
  document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('selected'));
  currentAgent = null;
}

function getRandomResponse(agent) {
  const responses = RESPONSES[agent.name] || ["Обрабатываю запрос...", "Готов к работе.", "Жду задачи."];
  return responses[Math.floor(Math.random() * responses.length)];
}

function getTime() {
  const now = new Date();
  return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

function addMessage(agent, text, type) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  if (type === 'agent') {
    div.innerHTML = `
      <div class="msg-avatar" style="background:${agent.color}22;border:1px solid ${agent.color}44">${agent.emoji}</div>
      <div>
        <div class="msg-bubble">${text}</div>
        <div class="msg-time">${getTime()}</div>
      </div>`;
  } else {
    div.innerHTML = `
      <div>
        <div class="msg-bubble">${text}</div>
        <div class="msg-time" style="text-align:right">${getTime()}</div>
      </div>
      <div class="msg-avatar" style="background:#7c3aed33;border:1px solid #7c3aed66">A</div>`;
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg agent';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="msg-avatar" style="background:${currentAgent.color}22;border:1px solid ${currentAgent.color}44">${currentAgent.emoji}</div>
    <div class="msg-bubble typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !currentAgent) return;
  input.value = '';
  input.style.height = 'auto';
  
  addMessage(currentAgent, text, 'user');
  showTyping();
  
  setTimeout(() => {
    removeTyping();
    addMessage(currentAgent, getRandomResponse(currentAgent), 'agent');
  }, 800 + Math.random() * 800);
}

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ==================== THREE.JS ====================
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.5;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.FogExp2(0x050510, 0.03);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 20, 22);
camera.lookAt(0, 0, 0);

// BRIGHT LIGHTING
scene.add(new THREE.AmbientLight(0x334466, 6));
const sun = new THREE.DirectionalLight(0xffffff, 3);
sun.position.set(10, 20, 10);
sun.castShadow = true;
scene.add(sun);

// Colored fill lights — BRIGHT
const lights = [
  [0xa855f7, 12, 20, [-8,6,-8]],
  [0x22d3ee, 12, 20, [8,6,8]],
  [0x34d399, 8, 15, [0,8,0]],
  [0xffffff, 6, 25, [0,15,0]],
];
lights.forEach(([color, intensity, dist, pos]) => {
  const l = new THREE.PointLight(color, intensity, dist);
  l.position.set(...pos);
  scene.add(l);
});

// FLOOR
const floorGeo = new THREE.PlaneGeometry(50, 50, 50, 50);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a20, metalness: 0.6, roughness: 0.4 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

const grid = new THREE.GridHelper(50, 50, 0x2a2a5a, 0x15153a);
grid.position.y = 0.01;
scene.add(grid);

// BUILD AGENT 3D WORKSTATIONS
const clickMeshes = [];
const animObjects = [];

AGENTS.forEach(agent => {
  const g = new THREE.Group();
  g.position.set(agent.pos[0], 0, agent.pos[2]);
  g.userData.agent = agent;

  const col = agent.hex;
  const emissiveInt = agent.status === 'active' ? 0.5 : agent.status === 'processing' ? 0.8 : 0.2;

  // DESK — bright, visible
  const desk = new THREE.Mesh(
    new THREE.BoxGeometry(2.4, 0.12, 1.6),
    new THREE.MeshStandardMaterial({ color: 0x1a1a3a, metalness: 0.7, roughness: 0.3, emissive: col, emissiveIntensity: 0.05 })
  );
  desk.position.y = 0.72; desk.castShadow = true; desk.receiveShadow = true;
  g.add(desk);

  // Desk edge glow strip
  const strip = new THREE.Mesh(
    new THREE.BoxGeometry(2.4, 0.04, 0.04),
    new THREE.MeshBasicMaterial({ color: col })
  );
  strip.position.set(0, 0.67, 0.82);
  g.add(strip);

  // MONITOR
  const monitor = new THREE.Mesh(
    new THREE.BoxGeometry(1.5, 1.0, 0.06),
    new THREE.MeshStandardMaterial({ color: 0x0a0a1a, metalness: 0.5, roughness: 0.2 })
  );
  monitor.position.set(0, 1.32, -0.45);
  g.add(monitor);

  // SCREEN — bright glowing
  const screen = new THREE.Mesh(
    new THREE.PlaneGeometry(1.35, 0.88),
    new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.25 })
  );
  screen.position.set(0, 1.32, -0.42);
  g.add(screen);

  // Bright screen glow light
  const screenLight = new THREE.PointLight(col, 3, 4);
  screenLight.position.set(0, 1.3, -0.3);
  g.add(screenLight);

  // AGENT BODY — bright colored
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.4, 0.55, 0.28),
    new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: emissiveInt, metalness: 0.6, roughness: 0.2 })
  );
  body.position.set(0, 1.1, 0.35);
  body.castShadow = true;
  g.add(body);

  // HEAD — brighter
  const head = new THREE.Mesh(
    new THREE.BoxGeometry(0.28, 0.24, 0.24),
    new THREE.MeshStandardMaterial({ color: 0x1a1a3a, emissive: col, emissiveIntensity: 0.7, metalness: 0.7, roughness: 0.1 })
  );
  head.position.set(0, 1.5, 0.35);
  g.add(head);

  // EYES — glowing
  [-0.07, 0.07].forEach(ex => {
    const eye = new THREE.Mesh(
      new THREE.BoxGeometry(0.055, 0.04, 0.01),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    eye.position.set(ex, 1.51, 0.48);
    g.add(eye);
  });

  // STATUS ORB — very bright
  const orb = new THREE.Mesh(
    new THREE.SphereGeometry(0.1, 16, 16),
    new THREE.MeshBasicMaterial({ color: STATUS_COLORS[agent.status] })
  );
  orb.position.set(0, 2.15, 0.35);
  g.add(orb);

  const orbLight = new THREE.PointLight(STATUS_COLORS[agent.status], 4, 5);
  orbLight.position.copy(orb.position);
  g.add(orbLight);

  // LABEL SPRITE
  const labelCanvas = document.createElement('canvas');
  labelCanvas.width = 320; labelCanvas.height = 80;
  const ctx = labelCanvas.getContext('2d');
  ctx.clearRect(0, 0, 320, 80);
  ctx.font = 'bold 32px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = agent.color;
  ctx.shadowBlur = 20;
  ctx.fillText(agent.name, 160, 36);
  ctx.font = '18px -apple-system, sans-serif';
  ctx.fillStyle = agent.color;
  ctx.shadowBlur = 10;
  ctx.fillText(agent.role, 160, 62);
  
  const tex = new THREE.CanvasTexture(labelCanvas);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
  sprite.position.set(0, 2.8, 0.35);
  sprite.scale.set(3, 0.75, 1);
  g.add(sprite);

  // CLICK HIT BOX
  const hit = new THREE.Mesh(
    new THREE.BoxGeometry(2.8, 3, 2.2),
    new THREE.MeshBasicMaterial({ visible: false })
  );
  hit.position.set(0, 1, 0);
  hit.userData.agent = agent;
  g.add(hit);
  clickMeshes.push(hit);

  scene.add(g);
  animObjects.push({ g, head, body, orb, orbLight, screen, screenLight, agent });
});

// CENTRAL HOLOGRAM
const holoGroup = new THREE.Group();
const beam = new THREE.Mesh(
  new THREE.CylinderGeometry(0.06, 0.06, 4, 8),
  new THREE.MeshBasicMaterial({ color: 0x22d3ee, transparent: true, opacity: 0.4 })
);
beam.position.y = 2;
holoGroup.add(beam);

for (let i = 0; i < 5; i++) {
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(2 - i*0.3, 0.025, 8, 32),
    new THREE.MeshBasicMaterial({ color: 0x22d3ee, transparent: true, opacity: 0.3 - i*0.05 })
  );
  ring.rotation.x = Math.PI / 2;
  ring.position.y = 0.5 + i * 0.6;
  holoGroup.add(ring);
}

const holoBase = new THREE.Mesh(
  new THREE.CylinderGeometry(2, 2, 0.06, 32),
  new THREE.MeshStandardMaterial({ color: 0x22d3ee, transparent: true, opacity: 0.2, emissive: 0x22d3ee, emissiveIntensity: 0.5 })
);
holoBase.position.y = 0.03;
holoGroup.add(holoBase);
scene.add(holoGroup);

const holoLight = new THREE.PointLight(0x22d3ee, 8, 12);
holoLight.position.set(0, 4, 0);
scene.add(holoLight);

// PARTICLES
const partGeo = new THREE.BufferGeometry();
const partCount = 300;
const partPos = new Float32Array(partCount * 3);
const partCol = new Float32Array(partCount * 3);
for (let i = 0; i < partCount; i++) {
  partPos[i*3] = (Math.random()-0.5)*48;
  partPos[i*3+1] = Math.random()*12;
  partPos[i*3+2] = (Math.random()-0.5)*48;
  const c = new THREE.Color([0xa855f7,0x22d3ee,0x34d399,0xf59e0b][Math.floor(Math.random()*4)]);
  partCol[i*3]=c.r; partCol[i*3+1]=c.g; partCol[i*3+2]=c.b;
}
partGeo.setAttribute('position', new THREE.BufferAttribute(partPos,3));
partGeo.setAttribute('color', new THREE.BufferAttribute(partCol,3));
const parts = new THREE.Points(partGeo, new THREE.PointsMaterial({ size:0.06, vertexColors:true, transparent:true, opacity:0.8 }));
scene.add(parts);

// ==================== CAMERA CONTROL ====================
let orbiting = false, lastMX = 0, lastMY = 0;
let sph = { theta: 0.3, phi: 0.65, r: 26 };
const tgt = new THREE.Vector3(0,0,0);

function camUpdate() {
  camera.position.x = tgt.x + sph.r * Math.sin(sph.phi) * Math.sin(sph.theta);
  camera.position.y = tgt.y + sph.r * Math.cos(sph.phi);
  camera.position.z = tgt.z + sph.r * Math.sin(sph.phi) * Math.cos(sph.theta);
  camera.lookAt(tgt);
}
camUpdate();

window.resetCamera = () => { sph = {theta:0.3,phi:0.65,r:26}; tgt.set(0,0,0); camUpdate(); };
window.topView = () => { sph = {theta:0,phi:0.12,r:38}; camUpdate(); };

canvas.addEventListener('mousedown', e => { if(e.button===0){orbiting=true;} lastMX=e.clientX; lastMY=e.clientY; });
window.addEventListener('mouseup', () => orbiting=false);
canvas.addEventListener('mousemove', e => {
  if (orbiting) {
    sph.theta -= (e.clientX-lastMX)*0.005;
    sph.phi = Math.max(0.1, Math.min(Math.PI*0.45, sph.phi+(e.clientY-lastMY)*0.005));
    camUpdate();
  }
  lastMX=e.clientX; lastMY=e.clientY;
  checkHover(e);
});
canvas.addEventListener('wheel', e => { sph.r = Math.max(8,Math.min(55,sph.r+e.deltaY*0.04)); camUpdate(); });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ==================== CLICK ====================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

canvas.addEventListener('click', e => {
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickMeshes);
  if (hits.length > 0) {
    const agent = hits[0].object.userData.agent;
    openChat(agent);
  }
});

function checkHover(e) {
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickMeshes);
  canvas.style.cursor = hits.length > 0 ? 'pointer' : 'default';
}

// ==================== ANIMATE ====================
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.016;

  animObjects.forEach((obj, i) => {
    const off = i * 0.8;
    obj.head.position.y = 1.5 + Math.sin(t*1.5+off)*0.04;
    obj.body.position.y = 1.1 + Math.sin(t*1.5+off)*0.025;
    obj.orb.position.y = 2.15 + Math.sin(t*2.5+off)*0.1;
    const p = 0.6 + Math.sin(t*3+off)*0.4;
    obj.orb.material.opacity = p;
    obj.orbLight.intensity = p * 5;
    if (obj.agent.status === 'processing') {
      obj.screen.material.opacity = 0.15 + Math.random()*0.15;
      obj.screenLight.intensity = 2 + Math.random()*2;
    }
  });

  holoGroup.rotation.y = t*0.4;
  holoLight.intensity = 6 + Math.sin(t*1.5)*3;

  const pp = parts.geometry.attributes.position.array;
  for(let i=0;i<partCount;i++){pp[i*3+1]+=0.006; if(pp[i*3+1]>12)pp[i*3+1]=0;}
  parts.geometry.attributes.position.needsUpdate=true;

  // Update clock
  const now=new Date();
  document.getElementById('clock').textContent = 
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')} PDT`;

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
