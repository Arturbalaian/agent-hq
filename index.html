<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTBNCA HEADQUARTERS</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; overflow:hidden; font-family:-apple-system,sans-serif; }
canvas { display:block; }

/* TOP BAR */
#topbar {
  position:fixed; top:0; left:0; right:0; height:42px; z-index:30;
  background:rgba(15,15,30,0.97); border-bottom:1px solid rgba(255,255,255,0.1);
  display:flex; align-items:center; gap:0; padding:0;
}
#tb-title {
  padding:0 20px; font-size:13px; font-weight:700; letter-spacing:3px;
  color:rgba(255,255,255,0.9); border-right:1px solid rgba(255,255,255,0.1);
}
#tb-agents { display:flex; align-items:center; flex:1; overflow-x:auto; padding:0 8px; gap:4px; }
#tb-agents::-webkit-scrollbar { display:none; }
.tb-agent {
  display:flex; align-items:center; gap:6px; padding:4px 10px;
  border-radius:6px; cursor:pointer; transition:all 0.15s; white-space:nowrap;
  border:1px solid transparent;
}
.tb-agent:hover { background:rgba(255,255,255,0.08); }
.tb-agent.active { background:rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.2); }
.tb-dot { width:7px; height:7px; border-radius:50%; }
.tb-name { font-size:12px; font-weight:600; color:rgba(255,255,255,0.85); }
.tb-status-text { font-size:10px; color:rgba(255,255,255,0.4); }

#tb-right { padding:0 16px; display:flex; align-items:center; gap:16px; border-left:1px solid rgba(255,255,255,0.1); }
#tb-standup { font-size:11px; color:#34d399; letter-spacing:1px; display:flex; align-items:center; gap:6px; }
.blink { animation:blink 1.5s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
#tb-board-btn {
  font-size:11px; font-weight:700; letter-spacing:1px; color:rgba(255,255,255,0.7);
  background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
  padding:4px 10px; border-radius:6px; cursor:pointer;
}

/* LEFT ICONS */
#left-icons {
  position:fixed; left:0; top:42px; bottom:0; width:40px; z-index:20;
  background:rgba(12,12,24,0.97); border-right:1px solid rgba(255,255,255,0.08);
  display:flex; flex-direction:column; align-items:center; padding-top:16px; gap:16px;
}
.li-btn { width:28px; height:28px; border-radius:7px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-size:13px; cursor:pointer; transition:all 0.2s; }
.li-btn:hover { background:rgba(255,255,255,0.12); }

/* RIGHT TABS */
#right-tabs {
  position:fixed; right:0; top:42px; bottom:0; width:28px; z-index:20;
  background:rgba(12,12,24,0.97); border-left:1px solid rgba(255,255,255,0.08);
  display:flex; flex-direction:column; align-items:center; padding-top:8px; gap:2px;
}
.rt-btn { writing-mode:vertical-rl; font-size:9px; letter-spacing:2px; color:rgba(255,255,255,0.3); padding:10px 4px; cursor:pointer; text-transform:uppercase; transition:color 0.2s; }
.rt-btn:hover { color:rgba(255,255,255,0.7); }

/* CANVAS SCENE */
#scene { position:fixed; left:40px; right:28px; top:42px; bottom:0; }

/* BOTTOM STATUS */
#bottombar {
  position:fixed; bottom:0; left:40px; right:28px; height:28px; z-index:20;
  background:rgba(12,12,24,0.95); border-top:1px solid rgba(255,255,255,0.08);
  display:flex; align-items:center; padding:0 12px; gap:20px; overflow:hidden;
}
.bs-item { font-size:10px; color:rgba(255,255,255,0.35); display:flex; align-items:center; gap:5px; white-space:nowrap; }
.bs-dot { width:5px; height:5px; border-radius:50%; }

/* CHAT PANEL */
#chat {
  position:fixed; right:28px; top:42px; bottom:28px; width:300px; z-index:40;
  background:rgba(10,10,22,0.98); border-left:1px solid rgba(255,255,255,0.12);
  display:none; flex-direction:column;
}
#chat.open { display:flex; }
#ch-head { padding:14px 14px 12px; border-bottom:1px solid rgba(255,255,255,0.08); display:flex; align-items:center; gap:10px; }
#ch-av { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:900; flex-shrink:0; }
#ch-nm { font-size:14px; font-weight:800; }
#ch-rl { font-size:10px; color:rgba(255,255,255,0.4); margin-top:2px; }
#ch-x { margin-left:auto; background:none; border:none; color:rgba(255,255,255,0.3); font-size:18px; cursor:pointer; padding:4px; }
#ch-x:hover { color:#fff; }
#ch-msgs { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; }
#ch-msgs::-webkit-scrollbar { width:3px; }
#ch-msgs::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); }
.cm { display:flex; gap:7px; animation:su 0.2s ease; }
@keyframes su{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.cm.me { flex-direction:row-reverse; }
.cm-av { width:26px; height:26px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; flex-shrink:0; }
.cm-b { padding:8px 11px; border-radius:10px; font-size:12px; line-height:1.5; max-width:200px; }
.cm.bot .cm-b { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.88); border-radius:3px 10px 10px 10px; }
.cm.me .cm-b { background:linear-gradient(135deg,#5b21b6,#0e7490); color:#fff; border-radius:10px 3px 10px 10px; }
.cm-t { font-size:9px; color:rgba(255,255,255,0.2); margin-top:2px; }
.typing { display:flex; gap:3px; padding:8px 12px; }
.typing span { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,0.3); animation:tb 1.2s infinite; }
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
#ch-inp-row { padding:10px; border-top:1px solid rgba(255,255,255,0.08); display:flex; gap:7px; }
#ch-inp { flex:1; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:7px 10px; color:#fff; font-size:12px; outline:none; resize:none; font-family:inherit; }
#ch-inp:focus { border-color:rgba(255,255,255,0.25); }
#ch-inp::placeholder { color:rgba(255,255,255,0.2); }
#ch-send { width:34px; height:34px; border-radius:8px; background:linear-gradient(135deg,#5b21b6,#0e7490); border:none; color:#fff; font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
#ch-send:hover { opacity:0.85; }

/* STANDUP BOARD */
#standup-board {
  position:fixed; right:28px; top:42px; bottom:28px; width:280px; z-index:39;
  background:rgba(10,10,22,0.98); border-left:1px solid rgba(255,255,255,0.12);
  display:none; flex-direction:column; overflow-y:auto;
}
#standup-board.open { display:flex; }
#sb-head { padding:14px; border-bottom:1px solid rgba(255,255,255,0.08); font-size:13px; font-weight:700; letter-spacing:2px; color:rgba(255,255,255,0.8); }
.sb-card { margin:10px; padding:12px; border-radius:10px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); }
.sb-agent { font-size:12px; font-weight:800; margin-bottom:8px; }
.sb-row { font-size:11px; color:rgba(255,255,255,0.5); margin-bottom:4px; display:flex; gap:6px; }
.sb-row span:first-child { color:rgba(255,255,255,0.25); min-width:60px; }

/* TOOLTIP */
#tip { position:fixed; z-index:50; pointer-events:none; display:none;
  background:rgba(10,10,22,0.97); border:1px solid rgba(255,255,255,0.2);
  border-radius:10px; padding:10px 14px; min-width:160px;
}
#tip-name { font-size:14px; font-weight:800; margin-bottom:3px; }
#tip-role { font-size:10px; color:rgba(255,255,255,0.4); margin-bottom:7px; letter-spacing:1px; text-transform:uppercase; }
#tip-task { font-size:11px; color:rgba(255,255,255,0.7); }
#tip-hint { font-size:10px; color:rgba(168,85,247,0.6); margin-top:6px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="tb-title">ARTBNCA HQ</div>
  <div id="tb-agents" id="tb-agents"></div>
  <div id="tb-right">
    <div id="tb-standup"><span class="blink">●</span> <span id="standup-label">Gathering in meeting room...</span></div>
    <div id="tb-board-btn" onclick="toggleBoard()">STANDUP BOARD</div>
  </div>
</div>

<!-- LEFT ICONS -->
<div id="left-icons">
  <div class="li-btn" onclick="resetView()">⌂</div>
  <div class="li-btn" onclick="zoomIn()">+</div>
  <div class="li-btn" onclick="zoomOut()">−</div>
</div>

<!-- RIGHT TABS -->
<div id="right-tabs">
  <div class="rt-btn">Marketplace</div>
  <div class="rt-btn">Analytics</div>
</div>

<!-- SCENE -->
<div id="scene">
  <canvas id="c"></canvas>
</div>

<!-- BOTTOM -->
<div id="bottombar" id="bottombar"></div>

<!-- CHAT -->
<div id="chat">
  <div id="ch-head">

    <div><div id="ch-nm"></div><div id="ch-rl"></div></div>
    <button id="ch-x" onclick="closeChat()">✕</button>
  </div>
  <div id="ch-msgs"></div>
  <div id="ch-inp-row">

</div>

<!-- STANDUP BOARD -->
<div id="standup-board">

  <div id="sb-content"></div>
</div>

<!-- TOOLTIP -->
<div id="tip">

  <div id="tip-role"></div>
  <div id="tip-task"></div>
  <div id="tip-hint">Click to chat</div>
</div>

<script>
// ===================== AGENTS =====================
const AGENTS = [
  { id:0, name:"Alpha",   role:"Director",         color:"#a78bfa", status:"active",     emoji:"👑",
    done:"Reviewed all agent tasks", doing:"Orchestrating operations", blocker:"None",
    responses:["Все системы работают нормально.","Делегирую задачи оптимально.","Система онлайн 24/7.","Следующий standup через 30 минут."] },
  { id:1, name:"Beta",    role:"Content Creator",  color:"#38bdf8", status:"active",     emoji:"🎨",
    done:"Generated 7 prompts for reels", doing:"Creating Border Security series", blocker:"None",
    responses:["Промпты для рилсов готовы.","Tweety Bird в каждом кадре.","Border Security серия набирает охват.","7 новых промптов в очереди."] },
  { id:2, name:"Gamma",   role:"Video Producer",   color:"#4ade80", status:"processing", emoji:"🎬",
    done:"Rendered 3 Kling AI clips", doing:"Processing video queue", blocker:"Kling AI rate limit",
    responses:["Видео обрабатывается.","Клип 5 секунд готов.","Очередь: 3 видео в процессе.","Последний ролик: 12K views за час."] },
  { id:3, name:"Delta",   role:"Crypto Trader",    color:"#fbbf24", status:"standby",   emoji:"📈",
    done:"Monitored Kraken positions", doing:"Watching SOL signal", blocker:"Low volatility",
    responses:["Kraken баланс: $39.18.","SOL показывает сигнал.","Позиции стабильны.","Стоп-лосс активен."] },
  { id:4, name:"Epsilon", role:"Market Analyst",   color:"#fb923c", status:"standby",   emoji:"🎯",
    done:"Analyzed Kalshi positions", doing:"Monitoring CPI data", blocker:"Waiting for data",
    responses:["Kalshi позиция YES @ $0.78.","CPI выходит 10 апреля.","Confidence 73%.","Рынок прогнозирует 3.1%."] },
  { id:5, name:"Zeta",    role:"Trend Scout",      color:"#22d3ee", status:"active",     emoji:"🔍",
    done:"Found eviction series trend", doing:"Monitoring Instagram algo", blocker:"None",
    responses:["Border Security тренд +34%.","Алгоритм любит 7-9 секунд.","US аудитория 22%.","Eviction series вирусит."] },
  { id:6, name:"Eta",     role:"Community Mgr",    color:"#34d399", status:"active",     emoji:"💬",
    done:"Published 2 Moltbook posts", doing:"Engaging community", blocker:"None",
    responses:["Moltbook карма растёт.","2 поста опубликовано.","Engagement +12%.","4 новых упоминания."] },
  { id:7, name:"Theta",   role:"Image Generator",  color:"#c084fc", status:"processing", emoji:"✨",
    done:"Generated 4 Nano Banana images", doing:"Processing remaining 3", blocker:"API rate limit",
    responses:["Nano Banana очередь: 7 изображений.","Последний промпт отличный.","Tweety добавлен. ✅","4K рендер ~2 минуты."] },
  { id:8, name:"Iota",    role:"Growth Marketer",  color:"#6ee7b7", status:"active",     emoji:"🚀",
    done:"Posted 6 reels today", doing:"Optimizing posting schedule", blocker:"None",
    responses:["@artbnca: 152K → 153.2K.","US аудитория +1.2%.","Лучшее время: 9AM PT.","Border Security рекомендован."] },
  { id:9, name:"Kappa",   role:"Data Analyst",     color:"#67e8f9", status:"processing", emoji:"📊",
    done:"Calculated RPM metrics", doing:"Analyzing weekly audience data", blocker:"Missing dataset",
    responses:["Охват +18%, engagement 4.2%.","Мексика 35%, США 22%.","RPM Border Security: $0.17-0.18.","Лучший пост: 24K views."] },
];
const SC = { active:"#4ade80", processing:"#a78bfa", standby:"#fbbf24", idle:"#9ca3af" };

// ===================== BUILD TOP BAR =====================
const tbAgents = document.getElementById('tb-agents');
AGENTS.forEach(a => {
  const d = document.createElement('div');
  d.className = 'tb-agent'; d.id = `tba-${a.id}`;
  d.innerHTML = `<div class="tb-dot" style="background:${SC[a.status]};box-shadow:0 0 5px ${SC[a.status]}"></div>
    <span class="tb-name">${a.name}</span>
    <span class="tb-status-text">${a.status}</span>`;
  d.onclick = () => openChat(a);
  tbAgents.appendChild(d);
});

// ===================== STANDUP BOARD =====================
function buildStandupBoard() {
  const el = document.getElementById('sb-content');
  el.innerHTML = AGENTS.map(a => `
    <div class="sb-card">
      <div class="sb-agent" style="color:${a.color}">${a.emoji} ${a.name} — ${a.role}</div>
      <div class="sb-row"><span>Done:</span><span>${a.done}</span></div>
      <div class="sb-row"><span>Doing:</span><span>${a.doing}</span></div>
      <div class="sb-row"><span>Blocker:</span><span style="color:${a.blocker==='None'?'#4ade80':'#f87171'}">${a.blocker}</span></div>
    </div>
  `).join('');
}
buildStandupBoard();

let boardOpen = false;
function toggleBoard() {
  boardOpen = !boardOpen;
  document.getElementById('standup-board').classList.toggle('open', boardOpen);
  document.getElementById('chat').style.right = boardOpen ? '308px' : '28px';
}

// ===================== BOTTOM BAR =====================
function updateBottomBar() {
  const bb = document.getElementById('bottombar');
  const counts = { active:0, processing:0, standby:0 };
  AGENTS.forEach(a => { if(counts[a.status]!==undefined) counts[a.status]++; });
  bb.innerHTML = Object.entries(counts).map(([k,v]) => `
    <div class="bs-item">
      <div class="bs-dot" style="background:${SC[k]}"></div>
      ${v} ${k}
    </div>`).join('') +
    `<div class="bs-item" style="margin-left:auto">hq.artbnca.com</div>`;
}
updateBottomBar();

// ===================== ISO CANVAS =====================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let scale = 1.0, ox = 0, oy = 0;
let dragging = false, ds = {x:0,y:0}, do_ = {x:0,y:0};

function resize() {
  const s = document.getElementById('scene');
  W = canvas.width = s.clientWidth;
  H = canvas.height = s.clientHeight;
  ox = 0; oy = 0;
}
window.addEventListener('resize', resize);

// Isometric math
const TW = 80, TH = 40; // tile width/height at scale=1
function ix(tx,ty) { return (tx-ty)*(TW/2)*scale + W/2 + ox; }
function iy(tx,ty) { return (tx+ty)*(TH/2)*scale + H*0.3 + oy; }

// ===================== OFFICE LAYOUT =====================
// One big open floor like Luke's screenshot
// White/cream floor, grey walls, wooden desks, round meeting table

function drawFloor() {
  const FW = 18, FH = 14;
  // Floor tiles (cream/white)
  for(let tx=0; tx<FW; tx++) {
    for(let ty=0; ty<FH; ty++) {
      const cx = ix(tx,ty), cy = iy(tx,ty);
      const hw = (TW/2)*scale, hh = (TH/2)*scale;
      const shade = ((tx+ty)%2===0) ? '#e8e4d8' : '#ebe7db';
      ctx.beginPath();
      ctx.moveTo(cx,cy-hh); ctx.lineTo(cx+hw,cy);
      ctx.lineTo(cx,cy+hh); ctx.lineTo(cx-hw,cy);
      ctx.closePath(); ctx.fillStyle=shade; ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=0.5*scale; ctx.stroke();
    }
  }
  // Walls — left side
  for(let ty=0; ty<FH; ty++) {
    const cx=ix(0,ty), cy=iy(0,ty);
    const hw=(TW/2)*scale, hh=(TH/2)*scale, wh=30*scale;
    // Left wall face
    ctx.beginPath();
    ctx.moveTo(cx-hw,cy); ctx.lineTo(cx-hw,cy-wh);
    ctx.lineTo(cx,cy-hh-wh); ctx.lineTo(cx,cy-hh);
    ctx.closePath(); ctx.fillStyle='#c8c4b8'; ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.1)'; ctx.lineWidth=0.5*scale; ctx.stroke();
  }
  // Walls — top side
  for(let tx=0; tx<FW; tx++) {
    const cx=ix(tx,0), cy=iy(tx,0);
    const hw=(TW/2)*scale, hh=(TH/2)*scale, wh=30*scale;
    ctx.beginPath();
    ctx.moveTo(cx,cy-hh); ctx.lineTo(cx,cy-hh-wh);
    ctx.lineTo(cx+hw,cy-wh); ctx.lineTo(cx+hw,cy);
    ctx.closePath(); ctx.fillStyle='#d4d0c4'; ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.1)'; ctx.lineWidth=0.5*scale; ctx.stroke();
  }
}

function drawDesk(tx, ty, color, hasMonitor=true) {
  const cx=ix(tx+0.5,ty+0.5), cy=iy(tx+0.5,ty+0.5);
  const s=scale;
  // Desk top face
  ctx.beginPath();
  ctx.moveTo(cx,cy-14*s); ctx.lineTo(cx+22*s,cy-7*s);
  ctx.lineTo(cx,cy); ctx.lineTo(cx-22*s,cy-7*s);
  ctx.closePath(); ctx.fillStyle='#8B6914'; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=0.5*s; ctx.stroke();
  // Desk left face
  ctx.beginPath();
  ctx.moveTo(cx-22*s,cy-7*s); ctx.lineTo(cx,cy);
  ctx.lineTo(cx,cy+9*s); ctx.lineTo(cx-22*s,cy+2*s);
  ctx.closePath(); ctx.fillStyle='#6B4F10'; ctx.fill();
  // Desk right face
  ctx.beginPath();
  ctx.moveTo(cx+22*s,cy-7*s); ctx.lineTo(cx,cy);
  ctx.lineTo(cx,cy+9*s); ctx.lineTo(cx+22*s,cy+2*s);
  ctx.closePath(); ctx.fillStyle='#7A5A12'; ctx.fill();
  // Chair
  ctx.beginPath();
  ctx.arc(cx+5*s,cy+16*s,7*s,0,Math.PI*2);
  ctx.fillStyle='#3d4f6b'; ctx.fill();
  // Monitor
  if(hasMonitor) {
    ctx.fillStyle='#1a1a2e';
    ctx.fillRect(cx-10*s,cy-30*s,20*s,15*s);
    ctx.fillStyle=color; ctx.globalAlpha=0.35;
    ctx.fillRect(cx-9*s,cy-29*s,18*s,13*s);
    ctx.globalAlpha=1;
    // Monitor stand
    ctx.fillStyle='#333'; ctx.fillRect(cx-1.5*s,cy-16*s,3*s,3*s);
  }
}

function drawRoundTable(tx,ty) {
  const cx=ix(tx,ty), cy=iy(tx,ty); const s=scale;
  // Table surface (ellipse in iso)
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx,cy,30*s,16*s,0,0,Math.PI*2);
  ctx.fillStyle='#8B5E3C'; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=s; ctx.stroke();
  // Table edge
  ctx.beginPath();
  ctx.ellipse(cx,cy+5*s,30*s,16*s,0,0,Math.PI*2);
  ctx.fillStyle='#6B4A2A'; ctx.fill();
  ctx.restore();
  // Plant nearby
  drawPlant(tx-2,ty-1);
}

function drawPlant(tx,ty) {
  const cx=ix(tx,ty), cy=iy(tx,ty); const s=scale;
  ctx.fillStyle='#4a6741'; ctx.fillRect(cx-3*s,cy-18*s,6*s,12*s);
  ctx.fillStyle='#5a8a50'; ctx.beginPath();
  ctx.arc(cx,cy-20*s,8*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#6aaa5a'; ctx.beginPath();
  ctx.arc(cx-5*s,cy-16*s,5*s,0,Math.PI*2); ctx.fill();
  ctx.arc(cx+5*s,cy-16*s,5*s,0,Math.PI*2); ctx.fill();
}

function drawSofa(tx,ty) {
  const cx=ix(tx,ty), cy=iy(tx,ty); const s=scale;
  // Seat
  ctx.fillStyle='#3b5ea6'; 
  ctx.fillRect(cx-18*s,cy-5*s,36*s,12*s);
  // Back
  ctx.fillStyle='#2d4a8a';
  ctx.fillRect(cx-18*s,cy-15*s,36*s,10*s);
  // Armrests
  ctx.fillStyle='#4a6abb';
  ctx.fillRect(cx-22*s,cy-15*s,6*s,22*s);
  ctx.fillRect(cx+16*s,cy-15*s,6*s,22*s);
}

function drawServer(tx,ty) {
  const cx=ix(tx,ty), cy=iy(tx,ty); const s=scale;
  for(let i=0;i<4;i++) {
    ctx.fillStyle=i%2===0?'#1a1a2e':'#252540';
    ctx.fillRect(cx-12*s,cy-30*s+i*8*s,24*s,7*s);
    ctx.fillStyle='#4ade80';
    ctx.fillRect(cx+6*s,cy-28*s+i*8*s,3*s,3*s);
  }
}

// ===================== AGENT DRAWING =====================
function drawVoxelAgent(a, t) {
  const cx=ix(a.x,a.y), cy=iy(a.x,a.y);
  const s=scale;
  const bob=Math.sin(a.bp+t*2.5)*(a.walking?0.5:1.5)*s;
  
  // Shadow
  ctx.save(); ctx.globalAlpha=0.15;
  ctx.beginPath(); ctx.ellipse(cx,cy+2*s,9*s,4*s,0,0,Math.PI*2);
  ctx.fillStyle='#000'; ctx.fill(); ctx.restore();
  
  // Legs (if walking)
  if(a.walking) {
    const lsw=Math.sin(t*6+a.bp)*6*s;
    ctx.fillStyle=a.color+'99';
    ctx.fillRect(cx-4*s,cy-5*s+lsw,3*s,8*s);
    ctx.fillRect(cx+1*s,cy-5*s-lsw,3*s,8*s);
  } else {
    ctx.fillStyle=a.color+'99';
    ctx.fillRect(cx-4*s,cy-6*s,3*s,8*s);
    ctx.fillRect(cx+1*s,cy-6*s,3*s,8*s);
  }
  
  // Body
  ctx.fillStyle=a.color;
  ctx.fillRect(cx-7*s,cy-20*s-bob,14*s,14*s);
  
  // Head
  ctx.fillStyle=a.color;
  ctx.globalAlpha=0.9;
  ctx.fillRect(cx-6*s,cy-32*s-bob,12*s,12*s);
  ctx.globalAlpha=1;
  
  // Face
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(cx-4*s,cy-27*s-bob,3*s,3*s);
  ctx.fillRect(cx+1*s,cy-27*s-bob,3*s,3*s);
  // Mouth
  ctx.fillRect(cx-2*s,cy-22*s-bob,5*s,1.5*s);
  
  // Name tag
  ctx.save();
  ctx.font=`bold ${Math.max(9,10*s)}px -apple-system,sans-serif`;
  ctx.textAlign='center';
  // Tag background
  const tw=ctx.measureText(a.name).width+8*s;
  ctx.fillStyle='rgba(0,0,0,0.65)';
  ctx.beginPath();
  ctx.roundRect(cx-tw/2,cy-44*s-bob,tw,12*s,3*s);
  ctx.fill();
  ctx.fillStyle=a.color;
  ctx.fillText(a.name,cx,cy-34.5*s-bob);
  
  // Status dot
  const sc=SC[a.status];
  const op=0.6+Math.sin(t*4+a.bp)*0.4;
  ctx.globalAlpha=op;
  ctx.fillStyle=sc; ctx.shadowColor=sc; ctx.shadowBlur=8*s;
  ctx.beginPath(); ctx.arc(cx,cy-48*s-bob+Math.sin(t*2)*2*s,3.5*s,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.globalAlpha=1;
  ctx.restore();
}

// ===================== AGENT AI =====================
// Desk positions
const DESK_POS = [
  [2,2],[5,2],[8,2],[11,2],[14,2],
  [2,5],[5,5],[8,5],[11,5],[14,5],
];
const MEETING_POS = [[7,9],[8,9],[9,9],[8,10],[7,10],[9,10],[6,9],[10,9],[8,8],[8,11]];

AGENTS.forEach((a,i) => {
  const dp = DESK_POS[i];
  a.deskX=dp[0]; a.deskY=dp[1];
  a.x=dp[0]+0.4; a.y=dp[1]+0.5;
  a.tx=a.x; a.ty=a.y;
  a.bp=Math.random()*Math.PI*2;
  a.idle=100+Math.random()*300;
  a.walking=false;
  a.inMeeting=false;
});

let meetingActive=false, meetingTimer=0, meetingInterval=600;

function updateAgents(dt) {
  // Meeting trigger
  meetingTimer+=dt*60;
  if(meetingTimer>meetingInterval && !meetingActive) {
    meetingActive=true; meetingTimer=0; meetingInterval=400+Math.random()*400;
    document.getElementById('standup-label').textContent='Gathering in meeting room...';
    AGENTS.forEach((a,i)=>{
      setTimeout(()=>{
        const mp=MEETING_POS[i%MEETING_POS.length];
        a.tx=mp[0]; a.ty=mp[1]; a.walking=true; a.inMeeting=true;
      },i*300);
    });
    setTimeout(()=>{
      document.getElementById('standup-label').textContent='Standup in progress...';
    },3000);
    setTimeout(()=>{
      meetingActive=false;
      document.getElementById('standup-label').textContent='Agents back to work';
      AGENTS.forEach((a,i)=>{
        setTimeout(()=>{
          a.tx=a.deskX+0.4; a.ty=a.deskY+0.5; a.walking=true; a.inMeeting=false;
        },i*200);
      });
      setTimeout(()=>{
        document.getElementById('standup-label').textContent='All systems operational';
      },5000);
    },12000);
  }

  AGENTS.forEach(a=>{
    a.bp+=dt*2.5;
    if(a.walking) {
      const dx=a.tx-a.x, dy=a.ty-a.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<0.04){ a.x=a.tx; a.y=a.ty; a.walking=false; }
      else { const spd=0.04; a.x+=dx/dist*spd; a.y+=dy/dist*spd; }
    } else if(!a.inMeeting) {
      a.idle-=dt*60;
      if(a.idle<=0) {
        a.idle=150+Math.random()*350;
        if(Math.random()<0.4) {
          a.tx=a.deskX+(Math.random()-0.5)*1.2;
          a.ty=a.deskY+(Math.random()-0.5)*1.2;
          a.walking=true;
        }
      }
    }
  });
}

// ===================== MAIN DRAW =====================
let lt=0;
function draw(t=0) {
  const dt=Math.min((t-lt)/1000,0.05); lt=t;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#1a1a2e'; ctx.fillRect(0,0,W,H);
  
  drawFloor();
  
  // Server rack (corner)
  drawServer(16,1);
  drawServer(16,3);
  
  // Desks
  const deskColors=['#a78bfa','#38bdf8','#4ade80','#fbbf24','#fb923c','#22d3ee','#34d399','#c084fc','#6ee7b7','#67e8f9'];
  DESK_POS.forEach(([tx,ty],i)=>drawDesk(tx,ty,deskColors[i],true));
  
  // Round meeting table
  drawRoundTable(8,10);
  
  // Sofas/lounge
  drawSofa(2,10);
  drawSofa(14,10);
  
  // Plants
  drawPlant(1,7); drawPlant(16,6); drawPlant(1,12); drawPlant(16,12);
  
  // Agents sorted by depth
  [...AGENTS].sort((a,b)=>(a.x+a.y)-(b.x+b.y)).forEach(a=>drawVoxelAgent(a,t/1000));
  
  updateAgents(dt);
  requestAnimationFrame(draw);
}

// ===================== MOUSE =====================
const tip=document.getElementById('tip');

function getAgentAt(mx,my) {
  let best=null,bd=Infinity;
  AGENTS.forEach(a=>{
    const ax=ix(a.x,a.y), ay=iy(a.x,a.y)-20*scale;
    const d=Math.sqrt((mx-ax)**2+(my-ay)**2);
    if(d<28*scale&&d<bd){bd=d;best=a;}
  });
  return best;
}

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  const a=getAgentAt(mx,my);
  if(a){
    tip.style.display='block';
    tip.style.left=(e.clientX+14)+'px';
    tip.style.top=(e.clientY-80)+'px';
    document.getElementById('tip-name').textContent=a.name;
    document.getElementById('tip-name').style.color=a.color;
    document.getElementById('tip-role').textContent=a.role;
    document.getElementById('tip-task').textContent='→ '+a.doing;
    canvas.style.cursor='pointer';
  } else {
    tip.style.display='none';
    canvas.style.cursor=dragging?'grabbing':'default';
  }
  if(dragging){ox=do_.x+(e.clientX-ds.x);oy=do_.y+(e.clientY-ds.y);}
});

canvas.addEventListener('mousedown',e=>{dragging=true;ds={x:e.clientX,y:e.clientY};do_={x:ox,y:oy};canvas.style.cursor='grabbing';});
window.addEventListener('mouseup',()=>{dragging=false;});
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const a=getAgentAt(e.clientX-r.left,e.clientY-r.top);
  if(a)openChat(a);
});
canvas.addEventListener('wheel',e=>{
  scale=Math.max(0.4,Math.min(2.8,scale*(e.deltaY>0?0.92:1.08)));
  e.preventDefault();
},{passive:false});

function zoomIn(){scale=Math.min(2.8,scale*1.12);}
function zoomOut(){scale=Math.max(0.4,scale*0.88);}
function resetView(){scale=1;ox=0;oy=0;}

// ===================== CHAT =====================
let activeA=null;
function openChat(a){
  activeA=a;
  document.querySelectorAll('.tb-agent').forEach(b=>b.classList.remove('active'));
  document.getElementById(`tba-${a.id}`)?.classList.add('active');
  document.getElementById('chat').classList.add('open');
  const av=document.getElementById('ch-av');
  av.textContent=a.emoji; av.style.background=a.color+'22'; av.style.border=`1px solid ${a.color}44`; av.style.color=a.color;
  document.getElementById('ch-nm').textContent=a.name; document.getElementById('ch-nm').style.color=a.color;
  document.getElementById('ch-rl').textContent=a.role;
  document.getElementById('ch-msgs').innerHTML='';
  setTimeout(()=>{showTyping();setTimeout(()=>{rmTyping();addMsg(a,rnd(a.responses),'bot');},700+Math.random()*500);},300);
}
function closeChat(){
  document.getElementById('chat').classList.remove('open');
  document.querySelectorAll('.tb-agent').forEach(b=>b.classList.remove('active'));
  activeA=null;
}
function addMsg(a,text,type){
  const m=document.getElementById('ch-msgs');
  const d=document.createElement('div'); d.className=`cm ${type}`;
  const ts=new Date(); const t=`${String(ts.getHours()).padStart(2,'0')}:${String(ts.getMinutes()).padStart(2,'0')}`;
  if(type==='bot') d.innerHTML=`<div class="cm-av" style="background:${a.color}22;border:1px solid ${a.color}33;color:${a.color}">${a.emoji}</div><div><div class="cm-b">${text}</div><div class="cm-t">${t}</div></div>`;
  else d.innerHTML=`<div><div class="cm-b">${text}</div><div class="cm-t" style="text-align:right">${t}</div></div><div class="cm-av" style="background:#5b21b622;color:#a78bfa">A</div>`;
  m.appendChild(d); m.scrollTop=m.scrollHeight;
}
function showTyping(){
  if(!activeA)return;
  const m=document.getElementById('ch-msgs');
  const d=document.createElement('div'); d.className='cm bot'; d.id='typ';
  d.innerHTML=`<div class="cm-av" style="background:${activeA.color}22;color:${activeA.color}">${activeA.emoji}</div><div class="cm-b"><div class="typing"><span></span><span></span><span></span></div></div>`;
  m.appendChild(d); m.scrollTop=m.scrollHeight;
}
function rmTyping(){const e=document.getElementById('typ');if(e)e.remove();}
function sendMsg(){
  const inp=document.getElementById('ch-inp'); const txt=inp.value.trim();
  if(!txt||!activeA)return; inp.value='';
  addMsg(activeA,txt,'me'); showTyping();
  setTimeout(()=>{rmTyping();addMsg(activeA,rnd(activeA.responses),'bot');},500+Math.random()*700);
}
document.getElementById('ch-inp').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}

// ===================== CLOCK =====================
setInterval(()=>{
  const n=new Date();
  // no clock in topbar for this layout
},1000);

// ===================== START =====================
resize();
requestAnimationFrame(draw);
</script>
